<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Telegram Test</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a1128; color: #fff; padding: 20px; max-width: 600px; margin: auto; }
        .box { background: #131f42; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #00bfff; }
        input { width: 95%; padding: 10px; margin: 5px 0 15px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { padding: 10px 20px; background: #00bfff; color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .result-item { background: #1b2a4a; padding: 10px; margin-top: 10px; border-radius: 4px; border-left: 4px solid #32cd32; word-break: break-all; }
        .meta { font-size: 12px; color: #aaa; margin: 5px 0; }
        .url { color: #00bfff; font-family: monospace; }
        #libStatus { padding: 10px; background: #8b0000; color: white; text-align: center; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⚡ GitHub Pages Live Telegram Test</h2>

    <div id="libStatus">⏳ Connecting to Global CDNs... Please wait.</div>

    <div class="box">
        <label>API ID (Number)</label>
        <input type="number" id="apiId" placeholder="e.g., 1234567">
        
        <label>API Hash (String)</label>
        <input type="text" id="apiHash" placeholder="e.g., a1b2c3d4e5f6...">
        
        <label>Bot Token</label>
        <input type="text" id="botToken" placeholder="e.g., 123456:ABC-DEF...">
        
        <label>Private Channel ID</label>
        <input type="text" id="channelId" placeholder="e.g., -1001234567890">

        <hr style="border-color:#223366; margin: 20px 0;">

        <label>Movie Name to Search</label>
        <input type="text" id="movieSearch" placeholder="e.g., Major">
        <button id="runBtn" onclick="runTest()" disabled>Loading API...</button>
    </div>

    <div id="status" style="margin-top: 10px; color: #ffdf00; font-weight: bold;"></div>
    <div id="results"></div>

    <script>
        // The Waterfall Loader: Tries multiple servers until one works
        const cdns = [
            "https://cdn.jsdelivr.net/npm/telegram@2.22.2/browser/telegram.js",
            "https://unpkg.com/telegram@2.22.2/browser/telegram.js",
            "https://bundle.run/telegram@2.22.2"
        ];
        
        let currentCdnIndex = 0;

        function loadNextCDN() {
            if (currentCdnIndex >= cdns.length) {
                document.getElementById("libStatus").innerHTML = "❌ All external servers blocked by your ISP! We need to host the file locally.";
                return;
            }

            let script = document.createElement('script');
            script.src = cdns[currentCdnIndex];
            
            script.onload = function() {
                if (typeof telegram !== "undefined") {
                    document.getElementById("libStatus").style.background = "green";
                    document.getElementById("libStatus").innerHTML = "✅ Library Loaded Successfully!";
                    document.getElementById("runBtn").disabled = false;
                    document.getElementById("runBtn").innerHTML = "Run Live Fetch Test";
                } else {
                    script.onerror(); // Loaded but empty, try next
                }
            };

            script.onerror = function() {
                console.log(`Failed to load from: ${cdns[currentCdnIndex]}. Trying next...`);
                currentCdnIndex++;
                loadNextCDN();
            };

            document.body.appendChild(script);
        }

        // Start the loading process
        loadNextCDN();

        // ----------------------------------------------------
        // The actual Bot logic (runs after library loads)
        // ----------------------------------------------------
        async function runTest() {
            const status = document.getElementById("status");
            const results = document.getElementById("results");
            results.innerHTML = ""; 

            const apiId = document.getElementById("apiId").value.trim();
            const apiHash = document.getElementById("apiHash").value.trim();
            const botToken = document.getElementById("botToken").value.trim();
            const channelId = document.getElementById("channelId").value.trim();
            const query = document.getElementById("movieSearch").value.trim();
            
            if (!apiId || !apiHash || !botToken || !channelId || !query) {
                status.innerHTML = "❌ Please fill out all configuration boxes.";
                return;
            }

            status.innerHTML = "⏳ Establishing secure connection to Telegram servers...";

            try {
                const { TelegramClient } = telegram;
                const { StringSession } = telegram.sessions;
                
                const client = new TelegramClient(new StringSession(""), parseInt(apiId), apiHash, { connectionRetries: 3 });
                await client.start({ botAuthToken: botToken });

                status.innerHTML = `🔍 Connected! Scanning channel for "${query}"...`;

                const messages = await client.getMessages(channelId, { search: query, limit: 15 });
                let foundLinks = [];

                for (const msg of messages) {
                    let fileMeta = "No video stream attachment located.";
                    
                    if (msg.media && msg.media.document) {
                        let doc = msg.media.document;
                        let sizeMb = (doc.size / 1048576).toFixed(2);
                        let fName = "Unknown File";
                        let fDur = "Unknown";
                        
                        for (const attr of doc.attributes) {
                            if (attr.className === "DocumentAttributeFilename") fName = attr.fileName;
                            if (attr.className === "DocumentAttributeVideo") fDur = Math.floor(attr.duration / 60) + " mins";
                        }
                        fileMeta = `<b>File:</b> ${fName} | <b>Size:</b> ${sizeMb} MB | <b>Duration:</b> ${fDur}`;
                    }

                    if (msg.replyMarkup && msg.replyMarkup.rows) {
                        msg.replyMarkup.rows.forEach(row => {
                            row.buttons.forEach(btn => {
                                if (btn.url && btn.text.toLowerCase().includes("download") && !btn.url.includes("t.me/")) {
                                    foundLinks.push({ btnText: btn.text, url: btn.url, meta: fileMeta });
                                }
                            });
                        });
                    }
                }

                if (foundLinks.length === 0) {
                    status.innerHTML = `⚠️ Connected, but found NO "Download" buttons matching "${query}".`;
                } else {
                    status.innerHTML = `🎉 Success! Extracted ${foundLinks.length} items.`;
                    foundLinks.forEach(link => {
                        results.innerHTML += `
                            <div class="result-item">
                                <strong>🔘 ${link.btnText}</strong> <br>
                                <div class="meta">${link.meta}</div>
                                <div class="url">${link.url}</div>
                            </div>
                        `;
                    });
                }
                await client.disconnect();

            } catch (error) {
                console.error(error);
                if (error.message.includes("CHANNEL_PRIVATE")) {
                    status.innerHTML = `❌ Error: Bot access rejected. Make sure the bot is an Admin in the channel.`;
                } else {
                    status.innerHTML = `❌ Error: ${error.message}`;
                }
            }
        }
    </script>
</body>
</html>
