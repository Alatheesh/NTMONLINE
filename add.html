<!DOCTYPE html>
<html>
<head>
  <title>Add File</title>
  <style>
    .ep-input { display: none; width: 80px; }
    .is-series .ep-input { display: inline-block; }
  </style>
</head>
<body>

<h2>Add New File</h2>

<div style="margin-bottom: 15px; padding: 10px; background: #eee; border-radius: 5px; display: inline-block;">
  <strong>Format:</strong>
  <label><input type="radio" name="format" value="movie" checked onchange="toggleFormat()"> Movie</label>
  <label><input type="radio" name="format" value="series" onchange="toggleFormat()"> Series</label>
</div>
<br>

<input type="text" id="name" placeholder="File Name"><br><br>
<input type="text" id="type" placeholder="Type (e.g. Series, Movie)"><br><br>
<input type="text" id="category" placeholder="Category"><br><br>

<input type="text" id="image" placeholder="Image URL"><br><br>

<h3>Download Links</h3>

<div id="links-container">
</div>

<br>
<button onclick="addLink()">➕ Add More</button>

<br><br>

<textarea id="description" placeholder="Description"></textarea><br><br>

<button onclick="addFile()">Add File</button>
<br><br>
<button onclick="goBack()">← Back</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  } else {
    addLink(); 
  }
});

function toggleFormat() {
  const isSeries = document.querySelector('input[name="format"]:checked').value === "series";
  const container = document.getElementById("links-container");
  if (isSeries) {
    container.classList.add("is-series");
  } else {
    container.classList.remove("is-series");
  }
}

function addLink() {
  const container = document.getElementById("links-container");
  const div = document.createElement("div");
  div.classList.add("link-row");

  div.innerHTML = `
    <input type="text" placeholder="Enter link" class="link-input">
    <input type="text" placeholder="Ep 1" class="ep-input">
    <select class="quality-input" style="width:80px;">
      <option value="Auto">Auto</option>
      <option value="480p">480p</option>
      <option value="720p" selected>720p</option>
      <option value="1080p">1080p</option>
      <option value="4K">4K</option>
    </select>
    <input type="number" placeholder="Size" class="size-input" style="width:70px;">
    <select class="size-unit">
      <option value="KB">KB</option>
      <option value="MB" selected>MB</option>
      <option value="GB">GB</option>
    </select>
    <button onclick="removeRow(this)">❌</button>
  `;
  container.appendChild(div);
}

function removeRow(btn) {
  btn.parentElement.remove();
}

async function addFile() {
  const fileName = document.getElementById("name").value.trim();
  const fileType = document.getElementById("type").value.trim();
  const fileCategory = document.getElementById("category").value.trim();
  const fileImage = document.getElementById("image").value.trim();
  const isSeries = document.querySelector('input[name="format"]:checked').value === "series";

  const rows = document.querySelectorAll(".link-row");
  let links = [];

  rows.forEach(row => {
    const url = row.querySelector(".link-input").value.trim();
    const episode = row.querySelector(".ep-input").value.trim();
    const quality = row.querySelector(".quality-input").value; 
    const size = row.querySelector(".size-input").value.trim();
    const unit = row.querySelector(".size-unit").value;

    if (url) {
      const scrambledUrl = btoa(url);
      if (isSeries && episode) {
        links.push({ url: scrambledUrl, episode, quality, size, unit }); 
      } else {
        links.push({ url: scrambledUrl, quality, size, unit }); 
      }
    }
  });

  const fileDescription = document.getElementById("description").value.trim();

  if (!fileName || !fileType || !fileCategory) {
    alert("Fill required fields");
    return;
  }

  try {
    // 1. Get local Max ID
    const res = await fetch("files.json");
    let localMax = 0;
    try {
      const localFiles = await res.json();
      localMax = Math.max(...localFiles.map(f => f.id || 0), 0);
    } catch(e) {}

    // 2. Get Firebase Max ID from the master_list array
    const docRef = db.collection("movie_database").doc("master_list");
    const docSnap = await docRef.get();
    let firebaseMax = 0;
    
    if (docSnap.exists && docSnap.data().movies) {
      const movies = docSnap.data().movies;
      firebaseMax = Math.max(...movies.map(m => m.customId || 0), 0);
    }

    const nextId = Math.max(localMax, firebaseMax) + 1;

    const newMovie = {
      customId: nextId,
      name: fileName,
      type: fileType,
      category: fileCategory,
      image: fileImage,
      links: links,
      description: fileDescription
    };

    // 3. Save to Firebase (creates doc if it doesn't exist)
    await docRef.set({
      movies: firebase.firestore.FieldValue.arrayUnion(newMovie)
    }, { merge: true });

    alert("File added successfully! ID: " + nextId);

    ["name","type","category","image","description"].forEach(id => {
      document.getElementById(id).value = "";
    });
    
    document.getElementById("links-container").innerHTML = "";
    addLink();

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
