<!DOCTYPE html>
<html>
<head>
  <title>Add Movie • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 💎 UNIVERSAL ADMIN CSS */
    body { font-family: Arial, sans-serif; background: #0a1128; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    h2 { color: #00bfff; margin-bottom: 20px; text-align: center; }
    .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    label.field-label { display: block; margin-bottom: 5px; font-size: 13px; color: #00bfff; font-weight: bold; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; outline: none; }
    input:focus { border-color: #00bfff; }
    button { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; background: #00bfff; color: black; font-weight: bold; cursor: pointer; }
    button:hover { background: #008cba; }
    
    .link-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='admin.html'">← Back to Dashboard</button>

<div class="container">
  <h2>➕ Add New Content</h2>

  <label class="field-label">File Name</label>
  <div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <input type="text" id="name" style="margin-bottom:0;">
    <button onclick="autoFillMovie()" style="width: auto; padding: 0 15px; background: #333; color: white;">🔍 Fetch</button>
  </div>

  <label class="field-label">Type (Movie/Series)</label>
  <input type="text" id="type" placeholder="e.g. Movie">

  <label class="field-label">Category</label>
  <input type="text" id="category" placeholder="e.g. Action">

  <label class="field-label">Cover Image URL</label>
  <input type="text" id="image">

  <label class="field-label">Description</label>
  <textarea id="description" rows="3"></textarea>

  <label class="field-label">Download Links</label>
  <div id="links-container">
    <div class="link-row">
      <input type="text" placeholder="Link" class="link-input">
      <button onclick="this.parentElement.remove()" style="width: auto; background: #ff4d4d; color: white;">❌</button>
    </div>
  </div>
  <button onclick="addLinkRow()" style="background: rgba(255,255,255,0.1); color: white;">+ Add More Links</button>

  <button onclick="saveMovie()" style="margin-top: 20px; font-size: 16px;">💾 Save to Database</button>
  <p id="status" style="text-align: center; margin-top: 10px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  async function autoFillMovie() {
    const movieName = document.getElementById("name").value.trim();
    const status = document.getElementById("status");
    const apiKey = "e262bd07ebfb205acaed257bb4227ea6";

    if (!movieName) { alert("Enter a name first!"); return; }

    status.innerText = "Fetching...";
    try {
      const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(movieName)}`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        const movie = data.results[0];
        document.getElementById("name").value = movie.title;
        document.getElementById("image").value = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
        document.getElementById("description").value = movie.overview;
        status.innerText = "✅ Details fetched!";
      } else { alert("No results found."); }
    } catch (e) { status.innerText = "❌ Error fetching."; }
  }

  function addLinkRow() {
    const div = document.createElement("div");
    div.className = "link-row";
    div.innerHTML = `<input type="text" placeholder="Link" class="link-input"><button onclick="this.parentElement.remove()" style="width: auto; background: #ff4d4d; color: white;">❌</button>`;
    document.getElementById("links-container").appendChild(div);
  }

  async function saveMovie() {
    const status = document.getElementById("status");
    const name = document.getElementById("name").value;
    const links = Array.from(document.querySelectorAll(".link-input")).map(i => btoa(i.value));

    if (!name) { alert("Missing fields!"); return; }

    try {
      const docRef = db.collection("movie_database").doc("master_list");
      const doc = await docRef.get();
      let movies = doc.exists ? doc.data().movies : [];
      
      movies.push({
        customId: Date.now(),
        name: name,
        type: document.getElementById("type").value,
        category: document.getElementById("category").value,
        image: document.getElementById("image").value,
        description: document.getElementById("description").value,
        links: links
      });

      await docRef.update({ movies: movies });
      status.innerText = "✅ Saved Successfully!";
      status.style.color = "#00bfff";
    } catch (e) { alert("Error: " + e.message); }
  }
</script>

</body>
</html>
