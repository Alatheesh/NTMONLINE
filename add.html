<!DOCTYPE html>
<html>
<head>
  <title>Add Movie • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a1128;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h2 { color: #00bfff; margin-bottom: 20px; text-align: center; }
    
    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #00bfff; font-weight: bold; }
    
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      outline: none;
      font-family: Arial, sans-serif;
    }
    
    input:focus, select:focus, textarea:focus { border-color: #00bfff; background: rgba(255,255,255,0.05); }
    
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
      background: #00bfff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #008cba; transform: scale(1.02); }
    
    .back-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      width: auto;
      padding: 8px 16px;
      margin-bottom: 20px;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='admin.html'">← Back to Dashboard</button>

<div class="container">
  <h2>➕ Add New Movie</h2>
  
  <label>Movie Name</label>
  <input type="text" id="name" placeholder="Enter movie title">

  <label>Type</label>
  <select id="type">
    <option value="Movie">Movie</option>
    <option value="Series">Series</option>
    <option value="Anime">Anime</option>
  </select>

  <label>Category / Genre</label>
  <input type="text" id="category" placeholder="e.g. Action, Comedy, Drama">

  <label>Cover Image URL</label>
  <input type="text" id="image" placeholder="Paste image link here">

  <label>Description</label>
  <textarea id="description" rows="3" placeholder="Brief description of the movie..."></textarea>

  <label>Streaming/Download Link</label>
  <input type="text" id="link" placeholder="Paste video or file link">

  <button onclick="addFile()">Upload Movie 🚀</button>
  <p id="status" style="text-align: center; font-size: 14px; margin-top: 10px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Redirect if not logged in (uses the session we built earlier)
  if (!localStorage.getItem("ntm_admin_session")) {
    window.location.href = "admin.html";
  }

  async function addFile() {
    const btn = document.querySelector("button[onclick='addFile()']");
    const status = document.getElementById("status");
    
    const name = document.getElementById("name").value.trim();
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value.trim();
    const image = document.getElementById("image").value.trim();
    const description = document.getElementById("description").value.trim();
    const link = document.getElementById("link").value.trim();

    if (!name || !link) {
      status.style.color = "#ff4d4d";
      status.innerText = "❌ Name and Link are required!";
      return;
    }

    btn.innerText = "Uploading...";
    btn.style.opacity = "0.7";
    btn.disabled = true;

    try {
      // Get the master list document
      const docRef = db.collection("movie_database").doc("master_list");
      const docSnap = await docRef.get();
      
      let movies = [];
      if (docSnap.exists && docSnap.data().movies) {
        movies = docSnap.data().movies;
      }

      // Generate ID (Timestamp)
      const newId = Date.now();

      // Create new movie object
      const newMovie = {
        customId: newId,
        name: name,
        type: type,
        category: category,
        image: image,
        description: description,
        link: link,
        dateAdded: new Date().toISOString()
      };

      // Add to array and save back to Firebase (1-Read architecture)
      movies.push(newMovie);
      await docRef.set({ movies: movies }, { merge: true });

      status.style.color = "#00bfff";
      status.innerText = "✅ Movie Added Successfully!";
      
      // Clear inputs
      document.getElementById("name").value = "";
      document.getElementById("category").value = "";
      document.getElementById("image").value = "";
      document.getElementById("description").value = "";
      document.getElementById("link").value = "";
      
    } catch (error) {
      status.style.color = "#ff4d4d";
      status.innerText = "❌ Error: " + error.message;
    }

    btn.innerText = "Upload Movie 🚀";
    btn.style.opacity = "1";
    btn.disabled = false;
  }
</script>

</body>
</html>
