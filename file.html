    .action-btn:hover { background: rgba(0, 191, 255, 0.15); border-color: #00bfff; transform: translateY(-2px); }
    .action-btn.saved { background: rgba(0, 191, 255, 0.2); border-color: #00bfff; color: #00bfff; }

    /* 🎬 THE WATCH BUTTONS */
    .download-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 25px; max-height: 350px; overflow-y: auto; padding-right: 10px; }
    
    .download-grid button { 
      flex: 1; 
      min-width: 130px;

    .download-grid button:hover {

    /* Updated Smart Back Button Styles */
    .back { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); margin: 30px auto; display: block; padding: 12px 25px; color: white; border-radius: 10px; cursor: pointer; width: 100%; max-width: 200px; text-align: center; transition: all 0.3s ease; }
    .back:hover { background: rgba(0, 191, 255, 0.2); border-color: #00bfff; }

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================================
// SMART BACK ROUTING
// ==========================================
function smartBack() {
  if (!document.referrer || !document.referrer.includes(window.location.hostname)) {
    window.location.href = "search.html"; // Route home for direct link clicks
  } else {
    history.back(); // Standard back to preserve scroll position on search.html
  }
}

// ==========================================
// TMDB API LOAD BALANCER & ERROR HANDLING
// ==========================================
const tmdbApiKeys = [
  "e262bd07ebfb205acaed257bb4227ea6",
  "931e6d3b603237c1179a7b8a23d2e8c4"
];
let currentKeyIndex = 0;

function getNextTmdbKey() {
  const key = tmdbApiKeys[currentKeyIndex];
  currentKeyIndex = (currentKeyIndex + 1) % tmdbApiKeys.length;
  return key;
}

async function fetchFromTMDB(tmdbId, mediaType) {
  const apiKey = getNextTmdbKey();
  const type = (mediaType || 'movie').toLowerCase(); 
  const endpoint = type === 'series' ? 'tv' : 'movie';
  const url = `https://api.themoviedb.org/3/${endpoint}/${tmdbId}?api_key=${apiKey}&language=en-US`;
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 second timeout
    
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    return await response.json();
  } catch (e) { 
    console.error("TMDB fetch gracefully handled failure in file.html:", e);
    return null; 
  }
}

// 1. INITIALIZE REMOTE CONFIG FOR REPORT TOGGLE
const remoteConfig = firebase.remoteConfig();
remoteConfig.settings.minimumFetchIntervalMillis = 0; 
remoteConfig.defaultConfig = { "is_report_btn_enabled": true };

remoteConfig.fetchAndActivate()
  .then(() => {
    const showReportButton = remoteConfig.getBoolean("is_report_btn_enabled");
    document.getElementById("reportBtn").style.display = showReportButton ? "block" : "none";
  })
  .catch((err) => console.error("Remote Config Error:", err));


// ==========================================
// 2. SEAMLESS FALLBACK CACHED ENGINE
// ==========================================
let currentFile = null; 
let currentFileId = null; 
let allFileLinks = []; 

window.addEventListener("DOMContentLoaded", loadFile);

async function loadFile() {
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get("id");
  if (!id) { 
      document.getElementById("fileCard").innerHTML = "<h2>No movie ID provided.</h2>"; 
      return; 
  }
  currentFileId = id;

  // 🛠  HELPER 1: Extract links safely
  const extractLinks = (data) => {
      if (data.links || data.downloads || data.stream_url || data.link) {
          if (Array.isArray(data.links) && data.links.length > 0) allFileLinks = data.links;
          else if (Array.isArray(data.downloads) && data.downloads.length > 0) allFileLinks = data.downloads;
          else if (data.link) allFileLinks = [data.link];
          else if (data.stream_url) allFileLinks = [data.stream_url];
      }
  };

  // 🛠 HELPER 2: The TMDB Hydrator
  const hydrateWithTMDB = (dataObj) => {
      const hasDescription = dataObj.description && dataObj.description !== 'No description provided.' && dataObj.description !== 'Loading...' && dataObj.description !== 'No plot summary available.';
      const hasPoster = dataObj.image && !dataObj.image.includes('placeholder') && !dataObj.image.includes('No Image');

      if (dataObj.tmdb_id && (!hasDescription || !hasPoster || !dataObj.category || !dataObj.runtime)) {
          console.log("🌐 Calling TMDB API in file.html as fallback...");
          fetchFromTMDB(dataObj.tmdb_id, dataObj.media_type || dataObj.type).then(tmdbData => {
              if (tmdbData) {
                  dataObj.description = tmdbData.overview || dataObj.description || "Description not available";
                  dataObj.image = tmdbData.poster_path ? `https://image.tmdb.org/t/p/w500${tmdbData.poster_path}` : (dataObj.image || 'https://via.placeholder.com/400x220?text=No+Image');
                  dataObj.rating = tmdbData.vote_average ? tmdbData.vote_average.toFixed(1) : (dataObj.rating || "N/A");
                  dataObj.release_date = tmdbData.release_date || dataObj.release_date || "N/A";
                  
                  // Format TMDB Genres
                  if (tmdbData.genres && tmdbData.genres.length > 0) {
                      dataObj.category = tmdbData.genres.map(g => g.name).join(", ");
                  }

                  // Format TMDB Runtime
                  if (tmdbData.runtime) {
                      dataObj.runtime = tmdbData.runtime + " min"; 
                  } else if (tmdbData.episode_run_time && tmdbData.episode_run_time.length > 0) {
                      dataObj.runtime = tmdbData.episode_run_time[0] + " min"; 
                  }
                  
              } else {
                  // Fallback for failed TMDB fetch
                  dataObj.description = dataObj.description || "Description not available";
                  dataObj.image = dataObj.image || 'https://via.placeholder.com/400x220?text=No+Image';
              }
              
              // Update individual session cookie
              sessionStorage.setItem("ntm_current_movie", JSON.stringify(dataObj));

              // Also update in master catalog if exists
              const storedCatalog = sessionStorage.getItem("ntm_movie_catalog");
              if (storedCatalog) {
                  try {
                      const catalog = JSON.parse(storedCatalog);
                      const idx = catalog.findIndex(m => String(m.id || m.customId) === String(id));
                      if (idx !== -1) {
                          catalog[idx] = dataObj;
                          sessionStorage.setItem("ntm_movie_catalog", JSON.stringify(catalog));
                      }
                  } catch (err) {
                      console.error(err);
                  }
              }
              
              // Repaint the UI with the fresh data
              paintUI(dataObj); 
              if (allFileLinks && allFileLinks.length > 0) {
                  processLinksAndRender(dataObj);
              }
          });
      } else {
          console.log("⚡ [TMDB Ignored file.html] Description and poster already in cache! Skipping TMDB API fetch.");
      }
  };

  // ==========================================
  // STEP A: SEARCH SINGLE FILE CACHE
  // ==========================================
  const cachedData = sessionStorage.getItem("ntm_current_movie");
  if (cachedData) {
      try {
          const parsedCache = JSON.parse(cachedData);
          if (String(parsedCache.id) === String(id) || String(parsedCache.customId) === String(id)) {
              console.log("⚡ [Cache Hit file.html - Single Movie] Details parsed from sessionStorage.ntm_current_movie!");
              const fileData = parsedCache;
              paintUI(fileData);
              currentFile = fileData;
              extractLinks(fileData);

              if (allFileLinks && allFileLinks.length > 0) {
                  processLinksAndRender(currentFile);
              }

              // Hydrate only if missing
              hydrateWithTMDB(fileData);
              return; 
          }
      } catch (e) {
          sessionStorage.removeItem("ntm_current_movie");
      }
  }

  // ==========================================
  // STEP B: FALLBACK SEARCH IN MASTER CATALOG CACHE
  // ==========================================
  let catalog = [];
  const catalogCache = sessionStorage.getItem("ntm_movie_catalog");
  if (catalogCache) {
      try {
          catalog = JSON.parse(catalogCache);
          if (Array.isArray(catalog)) {
              const foundInCatalog = catalog.find(m => String(m.id || m.customId) === String(id));
              if (foundInCatalog) {
                  console.log("⚡ [Cache Hit file.html - Master Catalog] Details retrieved from ntm_movie_catalog cache!");
                  const fileData = foundInCatalog;
                  sessionStorage.setItem("ntm_current_movie", JSON.stringify(fileData));
                  paintUI(fileData);
                  currentFile = fileData;
                  extractLinks(fileData);

                  if (allFileLinks && allFileLinks.length > 0) {
                      processLinksAndRender(currentFile);
                  }

                  // Hydrate only if missing
                  hydrateWithTMDB(fileData);
                  return;
              }
          }
      } catch (e) {
          console.error("Error searching local sessionStorage catalog cache:", e);
      }
  }

  // ==========================================
  // STEP C: FIREBASE FALLBACK 
  // ==========================================
  console.log("🌐 [Cache Miss file.html] Direct visit / hard refresh. Querying Firebase to cache ALL files...");
  try {
      let localFiles = [];
      let firebaseFiles = [];
      
      try { const res = await fetch("files.json"); localFiles = await res.json(); } catch (e) {}
      
      try {
          const docSnap = await db.collection("movie_database").doc("master_list").get();
          if (docSnap.exists && docSnap.data().movies) {
              firebaseFiles = docSnap.data().movies;
          }
      } catch (e) {}

      catalog = [...localFiles, ...firebaseFiles];
      catalog = catalog.filter(movie => movie && movie.name && movie.name !== "undefined");
      
      const uniqueMap = new Map();
      catalog.forEach(item => uniqueMap.set(item.customId || item.id, item));
      catalog = Array.from(uniqueMap.values());
      catalog.sort((a, b) => (b.customId || b.id) - (a.customId || a.id));

      sessionStorage.setItem("ntm_movie_catalog", JSON.stringify(catalog));

      let foundMovie = catalog.find(m => String(m.customId || m.id) === String(id));

      if (!foundMovie) {
          const singleSnap = await db.collection("movies").doc(String(id)).get();
          if (singleSnap.exists) {
              foundMovie = singleSnap.data();
          }
      }

      if (foundMovie) {
          paintUI(foundMovie);
          currentFile = foundMovie;
          extractLinks(foundMovie);
          sessionStorage.setItem("ntm_current_movie", JSON.stringify(foundMovie));
          
          if (allFileLinks && allFileLinks.length > 0) {
              processLinksAndRender(currentFile);
          }

          hydrateWithTMDB(foundMovie);
      } else {
          document.getElementById("fileCard").innerHTML = "<h2>Sorry, this movie hasn't been uploaded yet.</h2><p>Our team is probably working on it!</p>";
      }
  } catch (e) {
      console.error("Error fetching links from DB:", e);
      document.getElementById("fileCard").innerHTML = "<h2>Error loading movie data.</h2>";
  }
}

function paintUI(file) {
  if (file.backdrop) { 
      document.body.style.backgroundImage = `linear-gradient(180deg, rgba(2,2,2,0.85), rgba(10,17,40,0.9), rgba(2,2,2,0.95)), url('${file.backdrop}')`; 
      document.body.style.backgroundSize = "cover"; 
  }
  
  const imgUrl = file.image || (file.poster_path ? `https://image.tmdb.org/t/p/w500${file.poster_path}` : 'https://via.placeholder.com/400x220?text=No+Image');
  const title = file.name || file.title || "Unknown Title";
  const desc = file.description || file.overview || 'No description provided.';
  const rating = file.rating || file.vote_average;
  const year = file.release_date ? file.release_date.split('-')[0] : (file.year || '');

  document.getElementById("fileCard").innerHTML = `
    <img src="${imgUrl}">
    <h2>${title}</h2>
    <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 12px 0; font-size: 13px; font-weight: bold; color: #ccc;">
      ${file.upload_quality ? `<span style="background: #ffcc00; color: black; padding: 3px 8px; border-radius: 4px;">${file.upload_quality}</span>` : ''}
      ${rating && rating !== "N/A" ? `<span style="color: #ffcc00;">⭐ ${rating}/10</span>` : ''}
      ${year && year !== "N/A" ? `<span>📅 ${year}</span>` : ''}
      ${file.runtime ? `<span>⏳ ${file.runtime}</span>` : ''}
    </div>
    <p style="margin-top: 5px;"><strong>${file.type || 'Movie'}</strong> ${file.category ? '• ' + file.category : ''}</p>
    <p style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border-left: 3px solid #00bfff; font-size: 14px; text-align: left;">${desc}</p>
    
    <div style="display: flex; gap: 15px; justify-content: center; margin: 15px 0;">
      <button class="action-btn" id="shareBtn" onclick="shareMovie()">📤 Share</button>
      <button class="action-btn" id="bookmarkBtn" onclick="toggleBookmark()">🔖 Save</button>
    </div>

    <div id="quality-dropdown-container"></div>
    <div id="dynamic-button-container">
        <div class="modal-spinner" style="margin: 20px auto;"></div>
        <p style="opacity:0.7;">Fetching streaming links...</p>
    </div>`;
    
  checkBookmarkState();
}

function processLinksAndRender(file) {
  if (!allFileLinks || allFileLinks.length === 0) {
      document.getElementById("dynamic-button-container").innerHTML = "<p style='opacity:0.7; color: #ffcc00;'>Links are being processed or are currently unavailable.</p>";
      return;
  }

  if (file.type === "Series") { 
      allFileLinks.sort((a, b) => { let epA = 0, epB = 0; if (typeof a === "object" && a.episode) { const matchA = a.episode.match(/\d+/); if (matchA) epA = parseInt(matchA[0]); } if (typeof b === "object" && b.episode) { const matchB = b.episode.match(/\d+/); if (matchB) epB = parseInt(matchB[0]); } return epA - epB; }); 
  }
  
  let isSeries = false; let availableQualities = new Set();
  allFileLinks.forEach(l => { if (typeof l === "object" && l.episode) { isSeries = true; if (l.quality) availableQualities.add(l.quality); } });

  let qualityDropdownHTML = "";
  if (isSeries && availableQualities.size > 1) {
    const order = {"Auto": 1, "480p": 2, "720p": 3, "1080p": 4, "4K": 5};
    const sortedQualities = Array.from(availableQualities).sort((a, b) => (order[a] || 99) - (order[b] || 99));
    let defaultQ = sortedQualities.includes("480p") ? "480p" : sortedQualities[0];
    qualityDropdownHTML = `
      <div style="margin: 20px 0; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(0, 191, 255, 0.3);">
        <label for="qualitySelect" style="color: #00bfff; font-weight: bold; margin-right: 10px;">⚙️ Select Quality:</label>
        <select id="qualitySelect" onchange="renderButtons()" style="padding: 6px 12px; border-radius: 5px; background: #0a1128; color: #fff; border: 1px solid #00bfff; font-weight: bold; outline: none; cursor: pointer;">
          ${sortedQualities.map(q => `<option value="${q}" ${q === defaultQ ? "selected" : ""}>${q}</option>`).join("")}
        </select>
      </div>`;
  }
  
  const dropdownContainer = document.getElementById("quality-dropdown-container");
  if(dropdownContainer) dropdownContainer.innerHTML = qualityDropdownHTML;
  
  renderButtons();
}

function renderButtons() {
  const container = document.getElementById("dynamic-button-container");
  const qualitySelect = document.getElementById("qualitySelect");
  let linksToRender = allFileLinks;
  if (qualitySelect) { const selectedQuality = qualitySelect.value; linksToRender = allFileLinks.filter(l => typeof l === "object" && l.quality === selectedQuality); }

  let downloadHTML = "";
  if (linksToRender.length > 0) {
    downloadHTML = `<div class="download-grid">`;
    linksToRender.forEach((l, i) => {
      let label = `Watch ${i+1}`; 
      if (typeof l === "object" && l !== null) {
        if (l.episode && l.size) label = `▶ ${l.episode} - ${l.size} ${l.unit}`;
        else if (l.episode) label = `▶ ${l.episode}`;
        else if (l.size) label = `🎥 Watch ${l.size} ${l.unit} 🍿`;
      }
      const absoluteIndex = allFileLinks.indexOf(l);
      downloadHTML += `<button onclick="openWatch(${absoluteIndex})">${label}</button>`;
    });
    downloadHTML += `</div>`;
  } else { downloadHTML = `<p style='opacity:0.7;'>No episodes available for this quality.</p>`; }
  container.innerHTML = downloadHTML;
}

// ------------------------------------
// BOOKMARK, STATS, & SHARE LOGIC 
// ------------------------------------

function toggleBookmark() {
  if (!currentFile) return;
  let bookmarks = JSON.parse(localStorage.getItem("ntm_bookmarks")) || [];
  const existsIndex = bookmarks.findIndex(b => b.id === currentFileId);
  const btn = document.getElementById("bookmarkBtn");

  if (existsIndex > -1) {
    bookmarks.splice(existsIndex, 1);
    btn.innerHTML = "🔖 Save";
    btn.classList.remove("saved");
    alert("Removed from Bookmarks");
  } else {
    bookmarks.push({
      id: currentFileId,
      name: currentFile.name || currentFile.title,
      image: currentFile.image || (currentFile.poster_path ? `https://image.tmdb.org/t/p/w500${currentFile.poster_path}` : ''),
      type: currentFile.type || 'Movie'
    });
    btn.innerHTML = "✅ Saved";
    btn.classList.add("saved");
    alert("Added to Bookmarks!");
  }
  localStorage.setItem("ntm_bookmarks", JSON.stringify(bookmarks));
}

function checkBookmarkState() {
  let bookmarks = JSON.parse(localStorage.getItem("ntm_bookmarks")) || [];
  if (bookmarks.find(b => String(b.id) === String(currentFileId))) {
    const btn = document.getElementById("bookmarkBtn");
    if (btn) {
      btn.innerHTML = "✅ Saved";
      btn.classList.add("saved");
    }
  }
}

function trackBingeStats(file) {
  if (!file) return;
  let stats = JSON.parse(localStorage.getItem("ntm_user_stats")) || { firstTicket: new Date().toLocaleString('default', { month: 'short', year: 'numeric' }), lastVisit: "", streak: 0, streamsStarted: 0, moviesCount: 0, seriesCount: 0, genres: {}, timeOfDay: { morning: 0, afternoon: 0, evening: 0, night: 0 }, hypeScore: 0 };
  const today = new Date().toISOString().split('T')[0]; 
  if (stats.lastVisit !== today) {
    let yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1); const yestStr = yesterday.toISOString().split('T')[0];
    if (stats.lastVisit === yestStr) stats.streak += 1; else stats.streak = 1;
    stats.lastVisit = today;
  }
  stats.streamsStarted += 1;
  if (file.type === "Series") stats.seriesCount += 1; else stats.moviesCount += 1;
  if (file.category) { const fileGenres = file.category.split(",").map(g => g.trim()); fileGenres.forEach(g => { if (!stats.genres[g]) stats.genres[g] = 0; stats.genres[g] += 1; }); }
  const hour = new Date().getHours();
  if (hour >= 5 && hour < 12) stats.timeOfDay.morning += 1; else if (hour >= 12 && hour < 17) stats.timeOfDay.afternoon += 1; else if (hour >= 17 && hour < 22) stats.timeOfDay.evening += 1; else stats.timeOfDay.night += 1;
  localStorage.setItem("ntm_user_stats", JSON.stringify(stats));
}

function openWatch(clickedIndex) {
  const modal = document.getElementById('warningModal');
  modal.style.display = 'flex';
  setTimeout(() => { modal.classList.add('active'); }, 10);
  trackBingeStats(currentFile);
  let currentPlaylist = allFileLinks;
  const qualitySelect = document.getElementById("qualitySelect");
  if (qualitySelect) { currentPlaylist = allFileLinks.filter(l => typeof l === "object" && l.quality === qualitySelect.value); }
  const activeLink = allFileLinks[clickedIndex];
  const playlistIndex = currentPlaylist.indexOf(activeLink);
  const bingeData = { id: currentFileId, currentIndex: playlistIndex, playlist: currentPlaylist };
  let scrambledPayload = "";
  try { scrambledPayload = btoa(JSON.stringify(bingeData)); } 
  catch(e) { scrambledPayload = JSON.stringify(bingeData); }
  const netlifyUrl = "https://ntmonline.netlify.app/watch.html?data=" + encodeURIComponent(scrambledPayload);
  const finalDestination = "redirect.html?dest=" + encodeURIComponent(netlifyUrl);
  setTimeout(() => { window.location.href = finalDestination; }, 3500);
}

function shareMovie() {
  const url = window.location.href;
  const movieTitle = document.querySelector('h2') ? document.querySelector('h2').innerText : "this movie";
  const shareText = `\n🎬 *You HAVE to check this out!* 🍿\n\nI just found this movie on NTM Online and the quality is insane. ⚡\n\n🎥 Title: ${movieTitle}\n🚀 Watch here: ${url}\n\nIt's the fastest streaming experience I've used. See for yourself! 👇`;

  let stats = JSON.parse(localStorage.getItem("ntm_user_stats"));
  if (stats) { stats.hypeScore = (stats.hypeScore || 0) + 1; localStorage.setItem("ntm_user_stats", JSON.stringify(stats)); }

  if (navigator.share) {
    navigator.share({ title: 'NTM Watch Hub', text: shareText, url: url }).catch((e) => console.log("Share cancelled"));
  } else {
    navigator.clipboard.writeText(shareText).then(() => {
      alert("✅ Fancy link copied! Paste it to your friends.");
    }).catch(err => {
      prompt("Copy this to share:", shareText);
    });
  }
}

function reportIssue() {
  const msg = prompt("Describe the issue:"); if (!msg || msg.trim() === "") return; if (!currentFileId) return;
  db.collection("reports").add({ fileId: currentFileId, message: msg.trim(), time: new Date() }).then(() => { alert("Report submitted successfully 👍"); }).catch((error) => { alert("Failed to submit report ❌"); });
}

window.addEventListener('pageshow', function (event) { const modal = document.getElementById('warningModal'); if (modal) { modal.classList.remove('active'); modal.style.display = 'none'; } });
</script>
