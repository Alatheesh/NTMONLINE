<!DOCTYPE html>
<html>
<head>
  <title>File Details • NTM Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* FULL HEIGHT FIX & BASE FONT */
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      min-height: 100dvh;
      background: linear-gradient(180deg, #020202, #0a1128, #020202);
      color: #ffffff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 🌫️ GLOWING FALLING PARTICLES (Matches Search Page) */
    body::before {
      content: "";
      position: fixed;
      top: -100vh; left: 0; width: 100vw; height: 300vh;
      background-image:
        radial-gradient(circle at 15vw 25vh, rgba(0,191,255,0.8) 0%, transparent 4px),
        radial-gradient(circle at 75vw 15vh, rgba(141,124,255,0.8) 0%, transparent 5px),
        radial-gradient(circle at 45vw 65vh, rgba(255,255,255,0.8) 0%, transparent 3px),
        radial-gradient(circle at 85vw 85vh, rgba(0,191,255,0.8) 0%, transparent 6px),
        radial-gradient(circle at 25vw 95vh, rgba(141,124,255,0.8) 0%, transparent 4px);
      background-size: 100vw 100vh;
      z-index: -2;
      filter: drop-shadow(0 0 10px #00bfff) blur(0.5px);
      animation: fallDown 12s linear infinite;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      top: -100vh; left: 0; width: 100vw; height: 300vh;
      background-image:
        radial-gradient(circle at 10vw 10vh, rgba(0, 191, 255, 0.4) 0%, transparent 8px),
        radial-gradient(circle at 80vw 40vh, rgba(141, 124, 255, 0.4) 0%, transparent 10px),
        radial-gradient(circle at 40vw 80vh, rgba(255, 255, 255, 0.2) 0%, transparent 6px);
      background-size: 100vw 100vh;
      z-index: -3;
      filter: drop-shadow(0 0 15px #8d7cff) blur(2px);
      animation: fallDown 20s linear infinite;
      pointer-events: none;
    }

    @keyframes fallDown {
      0% { transform: translateY(0); }
      100% { transform: translateY(100vh); }
    }

    /* LAYOUT */
    .page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin-top: 60px;
      flex: 1;
    }

    .side-ad {
      width: 160px;
      margin: 20px;
      text-align: center;
      z-index: 5;
    }

    .center {
      max-width: 450px;
      width: 90%;
      margin: 0 15px;
      z-index: 5;
    }

    @media (max-width: 900px) {
      .side-ad { display: none; }
    }

    /* 💎 PREMIUM GLASSMORPHISM CARD - AUTOMATIC SIZING */
    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.02);
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
      transition: all 0.3s ease-in-out;
    }

    /* 🎬 RESPONSIVE IMAGE PROPERTIES (PREVENTS CROPPING) */
    .card img {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: 400px;
      object-fit: contain;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      background: rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      margin: 10px 0 5px;
      font-size: 24px;
      background: linear-gradient(90deg, #fff, #b3e5fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card p {
      color: #ccc;
      line-height: 1.5;
      font-size: 14px;
    }

    /* 🔘 BUTTONS */
    button {
      margin: 8px 6px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    /* Watch Buttons Grid */
    .download-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 25px;
    }

    .download-grid button {
      flex: 1;
      min-width: 130px;
      margin: 0;
      background: linear-gradient(135deg, #007bff, #00bfff);
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
    }

    .download-grid button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 20px rgba(0, 191, 255, 0.5);
    }

    /* Back Button Link */
    .back {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin: 30px auto;
      display: block;
      padding: 12px 25px;
    }

    .back:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    /* Report Fault Handler */
    #reportBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, #ff4d4d, #cc0000);
      padding: 10px 16px;
      border-radius: 10px;
      z-index: 1000;
      display: none;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    }

    #reportBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
    }

    /* SPONSOR LAYOUTS */
    .mobile-ad {
      display: none;
      text-align: center;
      margin: 20px;
      z-index: 5;
    }

    @media (max-width: 900px) {
      .mobile-ad { display: block; }
    }

    .bottom-banner {
      width: 100%;
      text-align: center;
      margin: 20px 0;
      z-index: 5;
    }
  </style>
</head>
<body>

<button id="reportBtn" onclick="reportIssue()">⚠ Report</button>

<div class="page">

  <div class="side-ad">
    <script>
      atOptions = {
        'key' : '6d18eab8e3174f704484a4e5fb7166a4',
        'format' : 'iframe',

    <script src="https://www.highperformanceformat.com/6d18eab8e3174f704484a4e5fb7166a4/invoke.js"></script>

  <div class="center">
    <div class="card" id="fileCard">
      <p style="opacity:0.7;">Loading Premium Details...</p>
    </div>
  </div>

  <div class="side-ad">
    <script>
      atOptions = {
        'key' : '6d18eab8e3174f704484a4e5fb7166a4',
        'format' : 'iframe',
        'height' : 300,
        'width' : 160,
        'params' : {}

    <script src="https://www.highperformanceformat.com/6d18eab8e3174f704484a4e5fb7166a4/invoke.js"></script>

</div>

<div class="mobile-ad">
  <script>
    atOptions = {

      'width' : 160,

</div>

<div class="bottom-banner">
  <script>
    atOptions = {
      'key' : '9d4e234e334f6012b5b60f60507d7877',
      'format' : 'iframe',
      'height' : 90,
      'width' : 728,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/9d4e234e334f6012b5b60f60507d7877/invoke.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFileId = null;

window.addEventListener("DOMContentLoaded", async function () {
  try {
    const doc = await db.collection("settings").doc("config").get();
    let enabled = true;

    if (doc.exists) {
      enabled = doc.data().reportEnabled !== false;
    }

    const btn = document.getElementById("reportBtn");
    btn.style.display = enabled ? "block" : "none";

  } catch (e) {
    console.error("Error loading report setting:", e);
  }
});

async function loadFile() {
  const id = Number(new URLSearchParams(location.search).get("id"));

  const res = await fetch("files.json");
  const localFiles = await res.json();

  const snapshot = await db.collection("files").get();

  const firebaseFiles = [];
  snapshot.forEach(doc => {
    const d = doc.data();
    firebaseFiles.push({
      id: Number(d.customId),
      name: d.name,
      type: d.type,
      category: d.category,
      image: d.image,
      description: d.description,
      links: d.links,
      link: d.link
    });
  });

  const file = [...localFiles, ...firebaseFiles].find(f => Number(f.id) === id);

  if (!file) {
    fileCard.innerHTML = "File not found";
    return;
  }

  currentFileId = file.id;

  let links = [];

  if (Array.isArray(file.links) && file.links.length > 0) {
    links = file.links;
  } 
  else if (Array.isArray(file.downloads) && file.downloads.length > 0) {
    links = file.downloads;
  } 
  else if (file.link && typeof file.link === "string" && file.link.trim() !== "") {
    links = [file.link];
  }

  let downloadHTML = "";

  if (links.length > 0) {
    downloadHTML = `<div class="download-grid">`;

    links.forEach((l,i) => {
      let url = typeof l === "string" ? l : l.url;
      let label = typeof l === "string"
        ? `Watch ${i+1}`
        : (l.size ? `🎥 Watch ${l.size} ${l.unit} 🍿` : `Watch ${i+1}`);

      downloadHTML += `
        <button onclick="openWatch('${url}')">
          ${label}
        </button>
      `;
    });

    downloadHTML += `</div>`;
  } else {
    downloadHTML = `<p style='opacity:0.7;'>No stream link available</p>`;
  }

  fileCard.innerHTML = `
    <img src="${file.image || 'https://via.placeholder.com/400x220?text=No+Image'}">
    <h2>${file.name}</h2>
    <p><strong>${file.type}</strong> • ${file.category}</p>
    <p>${file.description || ''}</p>
    ${downloadHTML}
  `;
}

// 🚀 UPDATED REDIRECT LOGIC
function openWatch(link) {
  // 1. Encode the actual video link to make it safe for URLs
  const encodedVideoLink = encodeURIComponent(link);
  
  // 2. Build the final destination URL (where they go after the 5 seconds)
  const finalDestination = "watch.html?link=" + encodedVideoLink;
  
  // 3. Encode that entire destination string
  const encodedDest = encodeURIComponent(finalDestination);
  
  // 4. Send the user to the redirect page, carrying the destination on its back!
  window.location.href = "redirect.html?dest=" + encodedDest;
}

function reportIssue() {
  const msg = prompt("Describe the issue:");
  if (!msg || msg.trim() === "") return;

  if (!currentFileId) {
    alert("Error: File not loaded yet.");
    return;
  }

  db.collection("reports").add({
    fileId: currentFileId,
    message: msg.trim(),
    time: new Date()
  })
  .then(() => {
    alert("Report submitted successfully 👍");
  })
  .catch((error) => {
    console.error("Error adding report:", error);
    alert("Failed to submit report ❌");
  });
}

loadFile();
</script>

</body>
