<!DOCTYPE html>
<html>
<head>
  <title>File Hub • NTM Stream</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* 🔥 AD STYLE */
    .ad {
      margin-bottom: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

  <button onclick="goHome()" class="back-btn">← Home</button>

  <div class="container">

    <div class="ad">
      <script>
        atOptions = {
          'key' : '9d4e234e334f6012b5b60f60507d7877',
          'format' : 'iframe',
          'height' : 90,
          'width' : 728,
          'params' : {}
        };
      </script>
      <script src="https://www.highperformanceformat.com/9d4e234e334f6012b5b60f60507d7877/invoke.js"></script>
    </div>

    <div class="top-bar">
      <h1 id="secret-title" style="user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; cursor: default;">🎬 NTM Watch Hub 🍿</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <div class="search-container">
      <input type="text" id="search" placeholder="Search Movie...">
      <button id="searchBtn" class="search-btn" onclick="toggleSearch()">🔍</button>
    </div>

    <div id="fileList"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <script src="script.js"></script>

  <script>
    // 1. THE CLOSURE VAULT (Hidden from F12 Console)
    let secretCache = null;

    // 2. SILENT PRELOADER (Costs exactly 1 read per page load)
    async function armTheTrap() {
      try {
        const docSnap = await db.collection("system_config").doc("security_keys").get();
        if (docSnap.exists) {
          secretCache = docSnap.data(); 
          console.log("Search modules loaded successfully."); // Fake boring message to trick snoops
        }
      } catch (error) {
        console.log("Error 404: Resource unavailable"); 
      }
    }
    
    // Fire the silent download immediately
    armTheTrap();

    // 3. THE 5-SECOND TRIGGER
    let holdTimer;
    const secretTrigger = document.getElementById('secret-title'); 

    if (secretTrigger) {
      
      const startTimer = (e) => {
        // Ignore right-clicks on a mouse
        if (e.type === 'mousedown' && e.button !== 0) return; 
        
        holdTimer = setTimeout(() => {
          
          if (!secretCache) {
            alert("Network error. Please try again later.");
            return;
          }

          // 🎁 THE TRAP IS SPRUNG
          let attempt = prompt("Wow, you found the mystery box! 🎁\n\nTry your lucky word to find out what happens next:");
          
          if (attempt !== null && attempt.trim() !== "") {
            
            // A. Check for Master Key (@Lathu63035) locally
            if (attempt === secretCache.bossHash) {
              alert("Welcome back, Boss! 👑");
              // Decode the cipher and teleport to the admin page
              window.location.href = atob(secretCache.bossRoute); 
              return;
            }

            // B. Check the Comedy Dictionary locally
            let response = secretCache.trapDictionary[attempt.toLowerCase()];
            if (response) {
              alert(response);
            } else {
              alert("ACCESS DENIED. Your guess has been logged.");
            }
          }
        }, 5000); // ⏱️ Exactly 5 seconds to trigger
      };

      const clearTimer = () => {
        clearTimeout(holdTimer);
      };

      // 📱 MOBILE & TELEGRAM TOUCH EVENTS
      secretTrigger.addEventListener('touchstart', startTimer);
      secretTrigger.addEventListener('touchend', clearTimer);
      secretTrigger.addEventListener('touchmove', clearTimer);   // Cancels if they scroll
      secretTrigger.addEventListener('touchcancel', clearTimer);

      // 💻 LAPTOP & CHROME MOUSE EVENTS
      secretTrigger.addEventListener('mousedown', startTimer);
      secretTrigger.addEventListener('mouseup', clearTimer);
      secretTrigger.addEventListener('mouseleave', clearTimer);  // Cancels if mouse slides off
    }
  </script>

</body>
</html>
