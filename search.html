<!DOCTYPE html>
<html>
<head>
  <title>File Hub • NTM Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🎬 NETFLIX-STYLE GRID */
    .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: 0 auto; }
    
    /* 🃏 CARD STYLES */
    .movie-card { 
      background: rgba(255, 255, 255, 0.05); 
      border-radius: 12px; overflow: hidden; position: relative; 
      transition: transform 0.3s ease; display: flex; flex-direction: column; 
      cursor: pointer; text-decoration: none; color: white; 
      border: 1px solid transparent;
    }
    .movie-card:hover { transform: scale(1.02); }
    .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .movie-info { padding: 8px; text-align: center; }
    .movie-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .movie-meta { font-size: 10px; opacity: 0.7; }
    .new-badge { position: absolute; top: 5px; left: 5px; background: #e50914; color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: bold; z-index: 10; }

    /* ☀️ LIGHT MODE OVERRIDES */
    body.light-mode .movie-card { background: rgba(0, 0, 0, 0.03); color: #111; border: 1px solid rgba(0,0,0,0.1); }
    body.light-mode .movie-meta { color: #555; }
    body.light-mode .page-info { color: #333; }

    /* 🔍 UNIFIED SEARCH BAR (ANIMATED) */
    .search-container { 
      position: relative;
      margin: 20px auto;
      width: 85%;
      max-width: 400px;
    }
    
    #search { 
      width: 100%; 
      box-sizing: border-box;
      padding: 12px 20px; 
      border-radius: 25px; 
      border: 1px solid rgba(255,255,255,0.2); 
      outline: none; 
      background: rgba(255, 255, 255, 0.1); 
      color: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    /* When clicked (focused) or active with text */
    #search:focus, .search-container.active #search { 
      border-color: #00bfff; 
      background: rgba(255,255,255,0.15); 
      padding-right: 50px; 
    }
    
    #searchBtn { 
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%) scale(0.5); 
      background: rgba(0, 191, 255, 0.2); 
      border: none;
      outline: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%; 
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; 
      pointer-events: none; 
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    
    #searchBtn:hover { 
      background: #00bfff; 
      color: black; 
    }
    
    /* Reveal the button ONLY when clicking the search bar or typing */
    .search-container:focus-within #searchBtn,
    .search-container.active #searchBtn {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1); 
    }
    
    /* Search Bar Light Mode */
    body.light-mode #search { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.2); color: #111; }
    body.light-mode #search:focus, body.light-mode .search-container.active #search { border-color: #008cba; }
    body.light-mode #searchBtn { background: rgba(0, 140, 186, 0.2); color: #111; }
    body.light-mode #searchBtn:hover { background: #008cba; color: white; }

    /* 📄 PAGINATION STYLES */
    .pagination-container { grid-column: span 3; text-align: center; margin-top: 20px; padding: 15px; }
    .pagination-container button { background: rgba(0, 191, 255, 0.2); border: 1px solid #00bfff; color: white; padding: 8px 12px; margin: 0 4px; border-radius: 5px; cursor: pointer; transition: all 0.3s ease; }
    .pagination-container button:hover:not(:disabled) { background: #00bfff; color: black; }
    .pagination-container button:disabled { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }
    .pagination-container .active-page { background: #00bfff; color: black; font-weight: bold; }
    .page-info { font-size: 12px; margin-bottom: 10px; opacity: 0.8; color: white; }
    
    body.light-mode .pagination-container button { color: #111; border-color: #008cba; background: rgba(0, 140, 186, 0.1); }
    body.light-mode .pagination-container .active-page { background: #008cba; color: white; }
    body.light-mode .pagination-container button:disabled { border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <div id="mysteryModal" class="custom-modal-overlay">
    <div class="custom-modal-box">
      <h3 id="modalTitle" class="custom-modal-title">Wow, you found the mystery box! 🎁</h3>
      <p id="modalDesc" class="custom-modal-desc">Try your lucky word to find out what happens next:</p>
      <input type="text" id="modalInput" class="custom-modal-input" placeholder="Enter secret word..." autocomplete="off">
      <div class="custom-modal-buttons">
        <button id="modalCancel" class="custom-modal-btn btn-cancel">Cancel</button>
        <button id="modalSubmit" class="custom-modal-btn btn-submit">Submit</button>
      </div>
    </div>
  </div>

  <button onclick="goHome()" class="back-btn">← Home</button>

  <div class="container">

    <div class="ad">
      <script>
        atOptions = {
          'key' : '9d4e234e334f6012b5b60f60507d7877',
          'format' : 'iframe',
          'height' : 90,
          'width' : 728,
          'params' : {}
        };
      </script>
      <script src="https://www.highperformanceformat.com/9d4e234e334f6012b5b60f60507d7877/invoke.js"></script>
    </div>

    <div class="top-bar">
      <h1 id="secret-title" style="user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; cursor: default;">🎬 NTM Watch Hub 🍿</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <div class="search-container" id="searchWrapper">
      <input type="text" id="search" placeholder="Search Movie...">
      <button id="searchBtn">🔍</button>
    </div>

    <div id="movie-grid" class="movie-grid">
      <p id="loadingText" style="text-align: center; grid-column: span 3;">Loading Database...</p>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==========================================
    // 1. MYSTERY BOX LOGIC
    // ==========================================
    let secretCache = null;
    async function armTheTrap() {
      try {
        const docSnap = await db.collection("system_config").doc("security_keys").get();
        if (docSnap.exists) { secretCache = docSnap.data(); }
      } catch (error) {}
    }
    armTheTrap();

    const modal = document.getElementById('mysteryModal');
    const mTitle = document.getElementById('modalTitle');
    const mDesc = document.getElementById('modalDesc');
    const mInput = document.getElementById('modalInput');
    const btnCancel = document.getElementById('modalCancel');
    const btnSubmit = document.getElementById('modalSubmit');
    let isAlertMode = false;

    function showPromptModal() {
      isAlertMode = false; mTitle.innerText = "Wow, you found the mystery box! 🎁"; mDesc.innerText = "Try your lucky word to find out what happens next:";
      mInput.style.display = "block"; mInput.value = ""; btnCancel.style.display = "block"; btnSubmit.innerText = "Submit";
      modal.classList.add('active'); setTimeout(() => mInput.focus(), 100);
    }
    function showMessageModal(title, message) {
      isAlertMode = true; mTitle.innerText = title; mDesc.innerText = message;
      mInput.style.display = "none"; btnCancel.style.display = "none"; btnSubmit.innerText = "OK"; modal.classList.add('active');
    }
    function closeModal() { modal.classList.remove('active'); }
    btnCancel.onclick = closeModal;

    mInput.addEventListener("keypress", function(event) { if (event.key === "Enter") { event.preventDefault(); btnSubmit.click(); }});
    
    btnSubmit.onclick = () => {
      if (isAlertMode) { closeModal(); return; }
      let attempt = mInput.value;
      if (attempt !== null && attempt.trim() !== "") {
        if (attempt === secretCache.bossHash) {
          showMessageModal("System Override 👑", "Welcome back, Boss! Routing to Admin Panel...");
          setTimeout(() => { window.location.href = atob(secretCache.bossRoute); }, 1500);
          return;
        }
        let scrambledGuess = "";
        let lowerAttempt = attempt.toLowerCase();
        for (let i = 0; i < lowerAttempt.length; i++) scrambledGuess += String.fromCharCode(lowerAttempt.charCodeAt(i) + 5);
        let response = secretCache.trapDictionary[scrambledGuess];
        if (response) showMessageModal("Wow your lucky😉", response);
        else showMessageModal("Unlucky 🫡", "Your guess is wrong, try again.");
      } else { closeModal(); }
    };

    let holdTimer;
    const secretTrigger = document.getElementById('secret-title'); 
    if (secretTrigger) {
      const startTimer = (e) => {
        if (e.type === 'mousedown' && e.button !== 0) return; 
        holdTimer = setTimeout(() => {
          if (!secretCache) { showMessageModal("Network Error 🌐", "Connection unstable. Please try again later."); return; }
          showPromptModal();
        }, 1000); 
      };
      const clearTimer = () => clearTimeout(holdTimer);
      secretTrigger.addEventListener('touchstart', startTimer); secretTrigger.addEventListener('touchend', clearTimer);
      secretTrigger.addEventListener('touchcancel', clearTimer); secretTrigger.addEventListener('mousedown', startTimer);
      secretTrigger.addEventListener('mouseup', clearTimer); secretTrigger.addEventListener('mouseleave', clearTimer);  
    }

    // ==========================================
    // 2. THEME TOGGLE (LIGHT / DARK MODE)
    // ==========================================
    const toggleBtn = document.getElementById("themeToggle");
    if (toggleBtn) {
      if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-mode"); toggleBtn.textContent = "🌙";
      } else { toggleBtn.textContent = "☀️"; }
      
      toggleBtn.addEventListener("click", function () {
        document.body.classList.toggle("light-mode");
        if (document.body.classList.contains("light-mode")) { localStorage.setItem("theme", "light"); toggleBtn.textContent = "🌙"; } 
        else { localStorage.setItem("theme", "dark"); toggleBtn.textContent = "☀️"; }
      });
    }

    // ==========================================
    // 3. 1-READ FIREBASE + PAGINATION LOGIC
    // ==========================================
    let allMovies = []; 
    let filteredMovies = [];
    let currentPage = 1;
    const itemsPerPage = 10;
    
    async function loadDatabase() {
      let localFiles = [];
      let firebaseFiles = [];
      
      try { const res = await fetch("files.json"); localFiles = await res.json(); } catch (e) {}
      
      try {
        const docSnap = await db.collection("movie_database").doc("master_list").get();
        if (docSnap.exists && docSnap.data().movies) firebaseFiles = docSnap.data().movies;
      } catch (e) {}

      allMovies = [...localFiles, ...firebaseFiles];
      allMovies = allMovies.filter(movie => movie && movie.name && movie.name !== "undefined");
      
      const uniqueMap = new Map();
      allMovies.forEach(item => uniqueMap.set(item.customId || item.id, item));
      allMovies = Array.from(uniqueMap.values());
      
      allMovies.sort((a, b) => (b.customId || b.id) - (a.customId || a.id));

      filteredMovies = [...allMovies];
      renderPage(1);
    }

    // 📄 RENDERS ONLY 10 MOVIES AT A TIME
    function renderPage(page) {
      currentPage = page;
      const grid = document.getElementById("movie-grid");
      grid.innerHTML = "";
      
      if (filteredMovies.length === 0) {
        grid.innerHTML = `<p class="page-info" style="grid-column: span 3; text-align: center;">No movies found.</p>`;
        return;
      }

      const startIndex = (page - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const moviesToDisplay = filteredMovies.slice(startIndex, endIndex);
      
      moviesToDisplay.forEach(d => {
        const uploadDate = new Date(d.customId || d.id);
        const isNew = (new Date() - uploadDate) < (3 * 24 * 60 * 60 * 1000);
        
        const card = document.createElement("a");
        card.className = "movie-card";
        card.href = "file.html?id=" + (d.customId || d.id);
        
        // ✨ INJECTED loading="lazy" HERE FOR PERFORMANCE UPGRADE
        card.innerHTML = `
          ${isNew ? '<div class="new-badge">NEW</div>' : ''}
          <img loading="lazy" src="${d.image || 'https://via.placeholder.com/200x300'}" alt="${d.name}">
          <div class="movie-info">
            <div class="movie-name">${d.name}</div>
            <div class="movie-meta">${d.type} • ${d.category}</div>
          </div>
        `;
        grid.appendChild(card);
      });

      renderPagination();
    }

    // 🔘 DRAWS THE NEXT/PREV BUTTONS
    function renderPagination() {
      const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
      const startItem = (currentPage - 1) * itemsPerPage + 1;
      const endItem = Math.min(currentPage * itemsPerPage, filteredMovies.length);

      if (filteredMovies.length === 0) return;

      const grid = document.getElementById("movie-grid");
      
      let paginationHtml = `
        <div class="pagination-container">
          <div class="page-info">Showing ${startItem}–${endItem} of ${filteredMovies.length} movies</div>
      `;

      paginationHtml += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;

      for (let i = 1; i <= totalPages; i++) {
        paginationHtml += `<button class="${i === currentPage ? 'active-page' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      paginationHtml += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
      paginationHtml += `</div>`;

      grid.innerHTML += paginationHtml;
    }

    window.goToPage = function(page) {
      const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
      if (page >= 1 && page <= totalPages) {
        renderPage(page);
      }
    };

    // ⚡ FIXED SEARCH LOGIC
    const searchInput = document.getElementById("search");
    const searchBtn = document.getElementById("searchBtn");
    const searchWrapper = document.getElementById("searchWrapper");
    let isSearchActive = false;

    function executeSearch() {
      const term = searchInput.value.toLowerCase().trim();
      
      if (!term) { 
        filteredMovies = [...allMovies]; 
        searchBtn.innerHTML = "🔍";
        isSearchActive = false;
        searchWrapper.classList.remove("active"); // Allows button to hide if unfocused
      } else {
        const searchWords = term.split(" ").filter(word => word !== "");
        filteredMovies = allMovies.filter(file => {
          const fileData = `${file.name || ""} ${file.type || ""} ${file.category || ""}`.toLowerCase();
          return searchWords.every(word => fileData.includes(word));
        });
        searchBtn.innerHTML = "✖"; 
        isSearchActive = true;
      }
      renderPage(1); 
    }

    // Keeps button visible if there is text in the box (even if user clicks away)
    searchInput.addEventListener("input", function(e) {
      if (e.target.value.trim() !== "") {
        searchWrapper.classList.add("active");
      } else {
        searchWrapper.classList.remove("active");
      }
      
      // Revert 'X' to '🔍' if user starts modifying a previous search
      if (isSearchActive && e.target.value.trim() !== "") {
        searchBtn.innerHTML = "🔍";
        isSearchActive = false;
      }
    });

    searchBtn.addEventListener("click", function() {
      if (isSearchActive) {
        searchInput.value = "";
        searchWrapper.classList.remove("active");
        executeSearch(); 
      } else {
        executeSearch();
      }
    });

    searchInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        executeSearch();
      }
    });

    function goHome() { window.location.href = "index.html"; }

    loadDatabase();
  </script>
</body>
</html>
