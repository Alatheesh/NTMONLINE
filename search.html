<!DOCTYPE html>
<html>
<head>
  <title>Search • NTM Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🎬 NETFLIX-STYLE GRID - 3 COLUMNS */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    .movie-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: scale(1.02);
    }

    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .movie-info {
      padding: 8px;
      text-align: center;
    }

    .movie-name {
      font-weight: bold;
      font-size: 12px;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
    }

    /* 🏷️ NEW BADGE */
    .new-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: #e50914;
      color: white;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
      z-index: 10;
    }

    .search-container {
      text-align: center;
      margin: 20px;
    }
    
    #search {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    
    #search::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <div class="top-bar" style="text-align: center; margin-top: 15px;">
    <h1 id="secret-title" style="user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; cursor: default;">🎬 NTM Watch Hub 🍿</h1>
  </div>

  <div class="search-container">
    <input type="text" id="search" placeholder="Search Movies...">
  </div>

  <div id="movie-grid" class="movie-grid">
    <p style="text-align: center; color: white; grid-column: span 3;">Loading Database...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allMovies = []; 

    async function loadDatabase() {
      const grid = document.getElementById("movie-grid");
      let localFiles = [];
      let firebaseFiles = [];

      // 1. Load Local JSON
      try {
        const res = await fetch("files.json");
        localFiles = await res.json();
      } catch (e) {}

      // 2. Load Firebase Master Array
      try {
        const docSnap = await db.collection("movie_database").doc("master_list").get();
        if (docSnap.exists && docSnap.data().movies) {
          firebaseFiles = docSnap.data().movies;
        }
      } catch (e) {
        console.error("Firebase fetch error:", e);
      }

      // 3. Merge, Filter Ghosts, and Sort
      allMovies = [...localFiles, ...firebaseFiles];
      
      // 🔥 GHOST CARD FILTER
      allMovies = allMovies.filter(movie => movie && movie.name && movie.name !== "undefined");
      
      // Filter duplicates by customId
      const uniqueMap = new Map();
      allMovies.forEach(item => uniqueMap.set(item.customId || item.id, item));
      allMovies = Array.from(uniqueMap.values());

      // Sort newest first
      allMovies.sort((a, b) => (b.customId || b.id) - (a.customId || a.id));

      renderGrid(allMovies);
    }

    function renderGrid(moviesToDisplay) {
      const grid = document.getElementById("movie-grid");
      grid.innerHTML = "";

      if (moviesToDisplay.length === 0) {
        grid.innerHTML = `<p style="text-align:center; color: white; grid-column: span 3;">No movies found.</p>`;
        return;
      }

      moviesToDisplay.forEach(d => {
        const uploadDate = new Date(d.customId || d.id);
        const now = new Date();
        const isNew = (now - uploadDate) < (3 * 24 * 60 * 60 * 1000);

        const card = document.createElement("div");
        card.className = "movie-card";
        card.onclick = () => window.location.href = "file.html?id=" + (d.customId || d.id);

        card.innerHTML = `
          ${isNew ? '<div class="new-badge">NEW</div>' : ''}
          <img src="${d.image || 'https://via.placeholder.com/200x300'}" alt="${d.name}">
          <div class="movie-info">
            <div class="movie-name">${d.name}</div>
            <div class="movie-meta">${d.type} • ${d.category}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById("search").addEventListener("input", function(e) {
      const term = e.target.value.toLowerCase().trim();
      
      if (!term) {
        renderGrid(allMovies);
        return;
      }

      const searchWords = term.split(" ").filter(word => word !== "");
      
      const filtered = allMovies.filter(file => {
        const fileData = `${file.name || ""} ${file.type || ""} ${file.category || ""}`.toLowerCase();
        return searchWords.every(word => fileData.includes(word));
      });

      renderGrid(filtered);
    });

    loadDatabase();

    // ==========================================
    // THE SECRET MYSTERY BOX TRIGGER
    // ==========================================
    let holdTimer;
    const secretTrigger = document.getElementById('secret-title'); 

    if (secretTrigger) {
      const startTimer = (e) => {
        if (e.type === 'mousedown' && e.button !== 0) return; 
        holdTimer = setTimeout(() => {
          window.location.href = "admin.html";
        }, 1000); 
      };

      const clearTimer = () => clearTimeout(holdTimer);

      secretTrigger.addEventListener('touchstart', startTimer);
      secretTrigger.addEventListener('touchend', clearTimer);
      secretTrigger.addEventListener('touchmove', clearTimer);  
      secretTrigger.addEventListener('touchcancel', clearTimer);
      secretTrigger.addEventListener('mousedown', startTimer);
      secretTrigger.addEventListener('mouseup', clearTimer);
      secretTrigger.addEventListener('mouseleave', clearTimer);  
    }
  </script>
</body>
</html>
