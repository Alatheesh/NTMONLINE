<!DOCTYPE html>
<html>
<head>
  <title>Export Data • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 💎 UNIVERSAL ADMIN CSS */
    body { font-family: Arial, sans-serif; background: #0a1128; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    h2 { color: #00bfff; margin-bottom: 20px; text-align: center; }
    .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 700px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .back-btn { background: rgba(255, 255, 255, 0.1); color: white; width: auto; padding: 8px 16px; margin-bottom: 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;}
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

    button { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; background: #00bfff; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #008cba; transform: scale(1.02); }

    textarea {
      width: 100%; height: 350px; box-sizing: border-box; padding: 15px; margin-top: 15px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3); color: #00ff00; outline: none; font-family: monospace; font-size: 13px;
    }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='admin.html'">← Back to Dashboard</button>

<div class="container">
  <h2>💾 Merge & Export Data</h2>
  <button onclick="mergeData()">1. Fetch & Merge Data</button>
  <button onclick="copyData()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">2. Copy JSON to Clipboard</button>
  
  <textarea id="output" placeholder="Merged JSON data will appear here..." readonly></textarea>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  if (!localStorage.getItem("ntm_admin_session")) { window.location.href = "admin.html"; }

  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = "admin.html"; }
  });

  async function mergeData() {
    const btn = document.querySelector("button[onclick='mergeData()']");
    btn.innerText = "Fetching...";
    
    try {
      let localFiles = [];
      try {
        const res = await fetch("files.json");
        localFiles = await res.json();
      } catch(e) {}

      const docSnap = await db.collection("movie_database").doc("master_list").get();
      const firebaseFiles = [];

      if (docSnap.exists && docSnap.data().movies) {
          const movies = docSnap.data().movies;
          movies.forEach(d => {
              firebaseFiles.push({
                  id: d.customId,
                  name: d.name,
                  type: d.type,
                  category: d.category,
                  description: d.description || "",
                  image: d.image || "",
                  downloads: d.links || []
              });
          });
      }

      const merged = [...localFiles, ...firebaseFiles];

      const uniqueMap = {};
      merged.forEach(item => { uniqueMap[item.id] = item; });
      const finalData = Object.values(uniqueMap);

      finalData.sort((a, b) => b.id - a.id);
      document.getElementById("output").value = JSON.stringify(finalData, null, 2);

    } catch (err) {
      alert("Error: " + err.message);
    }
    btn.innerText = "1. Fetch & Merge Data";
  }

  function copyData() {
    const textarea = document.getElementById("output");
    if (!textarea.value) { alert("Nothing to copy! Fetch data first."); return; }
    textarea.select();
    document.execCommand("copy");
    alert("✅ Copied to clipboard!");
  }
</script>

</body>
</html>
