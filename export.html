<!DOCTYPE html>
<html>
<head>
  <title>Auto Merge Export</title>
</head>
<body>

<h2>Auto Merge Firebase → files.json</h2>

<button onclick="goBack()">← Back</button>
<br><br>
<button onclick="mergeData()">Merge Data</button>
<button onclick="copyData()">Copy JSON</button>
<br><br>

<textarea id="output" rows="25" cols="90" placeholder="Merged JSON will appear here..."></textarea>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  }
});

async function mergeData() {
  try {
    // 1. LOAD LOCAL JSON
    let localFiles = [];
    try {
      const res = await fetch("files.json");
      localFiles = await res.json();
    } catch(e) {}

    // 2. LOAD FIREBASE ARRAY DATA (1 Read!)
    const docSnap = await db.collection("movie_database").doc("master_list").get();
    const firebaseFiles = [];

    if (docSnap.exists && docSnap.data().movies) {
        const movies = docSnap.data().movies;
        movies.forEach(d => {
            firebaseFiles.push({
                id: d.customId,
                name: d.name,
                type: d.type,
                category: d.category,
                description: d.description || "",
                image: d.image || "",
                downloads: d.links || []
            });
        });
    }

    // 3. MERGE BOTH
    const merged = [...localFiles, ...firebaseFiles];

    // 4. REMOVE DUPLICATES (by id)
    const uniqueMap = {};
    merged.forEach(item => {
      uniqueMap[item.id] = item;
    });

    const finalData = Object.values(uniqueMap);

    // 5. SORT (latest first)
    finalData.sort((a, b) => b.id - a.id);

    // 6. OUTPUT CLEAN JSON
    document.getElementById("output").value = JSON.stringify(finalData, null, 2);

  } catch (err) {
    console.error(err);
    alert("Error merging data: " + err.message);
  }
}

function copyData() {
  const textarea = document.getElementById("output");
  textarea.select();
  document.execCommand("copy");
  alert("Copied!");
}

function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
