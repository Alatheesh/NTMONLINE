<!DOCTYPE html>
<html>
<head>
  <title>Delete Movie • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 💎 UNIVERSAL ADMIN CSS */
    body {
      font-family: Arial, sans-serif;
      background: #0a1128;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h2 { color: #00bfff; margin-bottom: 20px; text-align: center; }
    
    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .back-btn { background: rgba(255, 255, 255, 0.1); color: white; width: auto; padding: 8px 16px; margin-bottom: 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;}
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
    
    /* 🗑️ DELETE LIST STYLING */
    .movie-item {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .movie-info { flex: 1; }
    .movie-info strong { font-size: 16px; color: white; display: block; margin-bottom: 5px; }
    .movie-info span { font-size: 12px; color: #00bfff; }

    .btn-danger {
      background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-danger:hover { background: #cc0000; transform: scale(1.05); }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='admin.html'">← Back to Dashboard</button>

<div class="container">
  <h2>🗑️ Delete File</h2>
  <div id="fileList">
    <p style="text-align: center; color: rgba(255,255,255,0.6);">Loading Database...</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  if (!localStorage.getItem("ntm_admin_session")) {
    window.location.href = "admin.html";
  }

  auth.onAuthStateChanged(user => {
    if (user) { loadFiles(); } 
    else { window.location.href = "admin.html"; }
  });

  async function loadFiles() {
    const container = document.getElementById("fileList");
    try {
      const docSnap = await db.collection("movie_database").doc("master_list").get();
      container.innerHTML = "";

      if (docSnap.exists && docSnap.data().movies && docSnap.data().movies.length > 0) {
          const movies = docSnap.data().movies;
          const sortedMovies = [...movies].sort((a, b) => b.customId - a.customId);

          sortedMovies.forEach(data => {
              container.innerHTML += `
              <div class="movie-item">
                  <div class="movie-info">
                    <strong>${data.name}</strong>
                    <span>${data.type} • ${data.category}</span>
                  </div>
                  <button class="btn-danger" onclick="deleteFile(${data.customId}, '${data.name}')">Delete</button>
              </div>
              `;
          });
      } else {
          container.innerHTML = "<p style='text-align:center;'>No movies found.</p>";
      }
    } catch(e) {
        container.innerHTML = "<p style='color:#ff4d4d;'>Error loading files.</p>";
    }
  }

  async function deleteFile(customId, name) {
    const confirmDelete = confirm(`⚠️ Are you sure you want to permanently delete "${name}"?`);
    if (!confirmDelete) return;

    try {
      const docRef = db.collection("movie_database").doc("master_list");
      const docSnap = await docRef.get();
      
      if (docSnap.exists) {
          let movies = docSnap.data().movies || [];
          movies = movies.filter(m => m.customId !== customId);
          
          await docRef.update({ movies: movies });
          alert("✅ File deleted successfully!");
          loadFiles(); 
      }
    } catch (err) {
      alert("❌ Error: " + err.message);
    }
  }
</script>

</body>
</html>
