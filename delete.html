<!DOCTYPE html>
<html>
<head>
  <title>Delete Files</title>
</head>
<body>

<h2>Delete File</h2>
<button onclick="goBack()">← Back</button>
<hr>

<h3>All Files</h3>
<div id="fileList">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  } else {
    loadFiles();
  }
});

async function loadFiles() {
  const container = document.getElementById("fileList");
  container.innerHTML = "Loading...";

  try {
    const docSnap = await db.collection("movie_database").doc("master_list").get();
    container.innerHTML = "";

    if (docSnap.exists && docSnap.data().movies) {
        const movies = docSnap.data().movies;
        movies.forEach(data => {
            container.innerHTML += `
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <strong>${data.name}</strong><br>
                ${data.type} • ${data.category}
                <br><br>
                <button onclick="deleteFile(${data.customId}, '${data.name}')">Delete</button>
            </div>
            `;
        });
    } else {
        container.innerHTML = "No movies found.";
    }
  } catch(e) {
      container.innerHTML = "Error loading files.";
  }
}

async function deleteFile(customId, name) {
  const confirmDelete = confirm(`Are you sure you want to delete "${name}"?`);
  if (!confirmDelete) return;

  try {
    const docRef = db.collection("movie_database").doc("master_list");
    const docSnap = await docRef.get();
    
    if (docSnap.exists) {
        let movies = docSnap.data().movies || [];
        // Filter out the movie we want to delete
        movies = movies.filter(m => m.customId !== customId);
        
        // Update Firebase with the new array
        await docRef.update({ movies: movies });
        
        alert("File deleted successfully!");
        loadFiles();
    }
  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
