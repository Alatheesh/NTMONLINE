<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel • NTM Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a1128;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    
    h2 {
      color: #00bfff;
      margin-bottom: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      box-sizing: border-box; 
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #00bfff;
    }

    /* 👁️ Password Container Styles */
    .password-container {
      position: relative;
      width: 100%;
      margin-bottom: 15px;
    }

    .password-container input {
      margin-bottom: 0; 
      padding-right: 40px; 
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      opacity: 0.7;
      transition: 0.3s;
    }

    .toggle-eye:hover {
      opacity: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
      background: #00bfff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #008cba;
      transform: scale(1.02);
    }

    .btn-danger {
      background: #ff4d4d;
      color: white;
      margin-top: 15px;
    }

    .btn-danger:hover {
      background: #cc0000;
    }
  </style>
</head>
<body>

<h2>⚙️ Admin Panel</h2>

<div id="loginBox" class="container">
  <h3>Secure Login</h3>
  <input type="email" id="username" placeholder="Admin Email">
  
  <div class="password-container">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-eye" id="togglePassword" onclick="togglePass()">👁️</span>
  </div>

  <button onclick="login()">Login</button>
</div>

<div id="menuBox" class="container" style="display:none;">
  <h3 style="margin-bottom: 25px;">Dashboard</h3>

  <button onclick="goTo('add.html')">➕ Add </button>
  <button onclick="goTo('edit.html')">✏️ Edit </button>
  <button onclick="goTo('delete.html')">🗑️ Delete </button>
  <button onclick="goTo('export.html')">💾 Export Data</button>
  <button onclick="goTo('reports.html')">⚠ View Reports</button>
  <button onclick="goTo('telegram.html')">📢 Telegram Broadcaster</button>

  <button class="btn-danger" onclick="logout()">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ==========================================
// 👁️ SHOW/HIDE PASSWORD LOGIC
// ==========================================
function togglePass() {
  const passInput = document.getElementById("password");
  const eyeIcon = document.getElementById("togglePassword");
  
  if (passInput.type === "password") {
    passInput.type = "text";
    eyeIcon.innerText = "🙈"; 
  } else {
    passInput.type = "password";
    eyeIcon.innerText = "👁️";
  }
}

// ==========================================
// 🕒 ROLLING 24-HOUR MEMORY LOGIC
// ==========================================
function setAdminSession() {
  const expireTime = Date.now() + 86400000; // Current time + 24 Hours
  localStorage.setItem("ntm_admin_session", expireTime.toString());
}

function checkAdminSession() {
  const session = localStorage.getItem("ntm_admin_session");
  if (session) {
    const expiry = parseInt(session);
    if (Date.now() < expiry) {
      // 🔄 ROLLING SESSION: Because they are still active, give them another full 24 hours!
      setAdminSession(); 
      return true; 
    } else {
      localStorage.removeItem("ntm_admin_session"); // Expired!
      return false;
    }
  }
  return false; // No session found
}

// ==========================================
// 🔐 AUTHENTICATION
// ==========================================

let isLoggingIn = false; 

function login() {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (!email || !pass) {
    alert("Please enter both email and password.");
    return;
  }

  isLoggingIn = true; 

  // 🛠️ FIX: Force Firebase to await LOCAL persistence BEFORE signing in
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .then(() => {
      return auth.signInWithEmailAndPassword(email, pass);
    })
    .then(() => {
      setAdminSession(); 
      isLoggingIn = false; 
      showMenu();
    })
    .catch(err => {
      isLoggingIn = false;
      alert("Login Failed: " + err.message);
    });
}

function logout() {
  localStorage.removeItem("ntm_admin_session"); 
  auth.signOut().then(() => {
    window.location.reload();
  });
}

function showMenu() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("menuBox").style.display = "block";
}

// AUTH LISTENER
auth.onAuthStateChanged(user => {
  if (isLoggingIn) return; 

  if (user && checkAdminSession()) {
    showMenu();
  } else {
    if (user) {
      auth.signOut();
    }
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("menuBox").style.display = "none";
  }
});

function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
