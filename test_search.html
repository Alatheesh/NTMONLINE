<!DOCTYPE html>
<html>
<head>
  <title>Search • NTM Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🎬 NETFLIX-STYLE GRID - 3 COLUMNS */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    .movie-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .movie-card:hover {
      transform: scale(1.02);
    }

    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    .movie-info {
      padding: 8px;
      text-align: center;
    }

    .movie-name {
      font-weight: bold;
      font-size: 12px;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
    }

    /* 🏷️ NEW BADGE */
    .new-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: #e50914;
      color: white;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
      z-index: 10;
    }

    .search-container {
      text-align: center;
      margin: 20px;
    }
    
    #search {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="text" id="search" placeholder="Search Movies...">
  </div>

  <div id="movie-grid" class="movie-grid"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMovies() {
      const snapshot = await db.collection("files").get();
      const grid = document.getElementById("movie-grid");
      grid.innerHTML = "";

      snapshot.forEach(doc => {
        const d = doc.data();
        
        // 🕒 Check if New (within 3 days)
        const uploadDate = d.uploadDate ? d.uploadDate.toDate() : new Date(0);
        const now = new Date();
        const isNew = (now - uploadDate) < (3 * 24 * 60 * 60 * 1000);

        const card = document.createElement("div");
        card.className = "movie-card";
        card.onclick = () => window.location.href = "file.html?id=" + d.customId;

        card.innerHTML = `
          ${isNew ? '<div class="new-badge">NEW</div>' : ''}
          <img src="${d.image || 'https://via.placeholder.com/200x300'}">
          <div class="movie-info">
            <div class="movie-name">${d.name}</div>
            <div class="movie-meta">${d.type} • ${d.category}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Search Filter
    document.getElementById("search").addEventListener("input", function(e) {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll(".movie-card").forEach(card => {
        const name = card.querySelector(".movie-name").innerText.toLowerCase();
        card.style.display = name.includes(term) ? "flex" : "none";
      });
    });

    loadMovies();
  </script>
</body>
</html>
