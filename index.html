<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTM Online - Welcome</title>
  <link rel="stylesheet" href="home.css">
  
  <style>
    /* =========================================
       🔘 TOP CORNER LOGO
       ========================================= */
    .top-corner-logo {
      width: 80px;      
      height: 80px;
      border-radius: 50%; 
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.6); 
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .logo-link {
      position: absolute;
      top: 20px;
      left: 20px; 
      text-decoration: none;
      display: inline-block;
      z-index: 100;
    }

    .logo-link:hover .top-corner-logo {
      transform: scale(1.1); 
      box-shadow: 0 0 22px rgba(0, 191, 255, 0.9);
    }

    /* =========================================
       📝 PREMIUM MINIMALIST FOOTER
       ========================================= */
    .premium-footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.3s ease;
    }

    .footer-links a:hover {
      color: #00bfff;
    }

    .footer-credits {
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div id="visitorBox">
  <span id="visitorCount">Visitors: 0</span>
</div>

<a href="about.html" class="logo-link">
  <img src="https://raw.githubusercontent.com/Alatheesh/PERSONAL_WEBSITE/main/images/logo.png" alt="NTM Online Logo" class="top-corner-logo">
</a>

<div class="hero glass-card">

  <h1>🎬 NTM Online 🍿</h1>

  <p class="subtitle">Your binge starts here 🎥</p>

  <button onclick="goToApp()" class="premium-btn">
    Get Started →
  </button>

</div>

<div class="premium-footer">
  
  <div class="footer-links">
    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="dmca.html">DMCA</a>
    <a href="disclaimer.html">Disclaimer</a>
  </div>

  <div class="footer-credits">
    © 2026 NTM Online. All rights reserved.
  </div>

</div>

<script>
function goToApp() {
  window.location.href = "search.html"; 
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
window.addEventListener("DOMContentLoaded", function () {
  try {
    const today = new Date().toLocaleDateString();
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const ref = db.collection("stats").doc("visitors");
    const lastVisit = localStorage.getItem("lastVisitDate");

    if (lastVisit !== today) {
      ref.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true })
      .then(() => {
        localStorage.setItem("lastVisitDate", today);
        return ref.get();
      })
      .then(doc => {
        document.getElementById("visitorCount").innerText = "Visitors: " + doc.data().count;
      });
    } else {
      ref.get().then(doc => {
        document.getElementById("visitorCount").innerText = "Visitors: " + doc.data().count;
      });
    }
  } catch (e) {
    console.error(e);
    document.getElementById("visitorCount").innerText = "Visitors unavailable";
  }
});
</script>

</body>
</html>
