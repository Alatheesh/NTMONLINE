<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTM Online - Welcome</title>
  <link rel="stylesheet" href="home.css">
  
  <style>
    /* =========================================
       🔘 TOP CORNER LOGO
       ========================================= */
    .top-corner-logo {
      width: 80px;      /* Increased size so it stands out! */
      height: 80px;
      border-radius: 50%; 
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.6); 
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .logo-link {
      position: absolute;
      top: 20px;
      left: 20px; 
      text-decoration: none;
      display: inline-block;
      z-index: 100;
    }

    .logo-link:hover .top-corner-logo {
      transform: scale(1.1); 
      box-shadow: 0 0 22px rgba(0, 191, 255, 0.9);
    }

    /* =========================================
       📝 PREMIUM FOOTER & LEGAL LINKS
       ========================================= */
    .footer-container {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .footer-glass {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 24px;
      border-radius: 30px; /* Creates a sleek pill shape */
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    .legal-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      transition: 0.3s ease;
      margin: 0 8px;
    }

    .legal-links a:hover {
      color: #00bfff; /* Glows cyan on hover */
      text-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
    }
  </style>
</head>
<body>

<div id="visitorBox">
  <span id="visitorCount">Visitors: 0</span>
</div>

<a href="about.html" class="logo-link">
  <img src="https://raw.githubusercontent.com/Alatheesh/PERSONAL_WEBSITE/main/images/logo.png" alt="NTM Online Logo" class="top-corner-logo">
</a>

<div class="hero glass-card">

  <h1>🎬 NTM Online 🍿</h1>

  <p class="subtitle">Your binge starts here 🎥</p>

  <button onclick="goToApp()" class="premium-btn">
    Get Started →
  </button>

</div>

<div class="footer-container">
  
  <div class="footer-glass">
    <span style="color: #00bfff; font-weight: bold;">© 2026</span> Developed by <strong>Latheesh Reddy</strong> ✨<br>
    <small style="opacity: 0.7;">For educational purposes only</small>
  </div>

  <div class="legal-links">
    <a href="legal.html">Terms of Service</a> | 
    <a href="legal.html">Privacy Policy</a> | 
    <a href="legal.html">DMCA Notice</a>
  </div>

</div>

<script>
function goToApp() {
  window.location.href = "search.html"; 
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
window.addEventListener("DOMContentLoaded", function () {

  try {
    const today = new Date().toLocaleDateString();

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const ref = db.collection("stats").doc("visitors");

    const lastVisit = localStorage.getItem("lastVisitDate");

    if (lastVisit !== today) {
      ref.set({
        count: firebase.firestore.FieldValue.increment(1)
      }, { merge: true })
      .then(() => {
        localStorage.setItem("lastVisitDate", today);
        return ref.get();
      })
      .then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    } else {
      ref.get().then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById("visitorCount").innerText =
      "Visitors unavailable";
  }

});
</script>

</body>
</html>
