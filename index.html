<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTM Online - Welcome</title>
  <link rel="stylesheet" href="home.css">
  
  <style>
    .top-corner-logo {
      width: 45px;
      height: 45px;
      border-radius: 50%; /* Makes the image a perfect circle */
      object-fit: cover;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.5); /* Premium cyan glow */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .logo-link {
      position: absolute;
      top: 20px;
      left: 20px; /* Anchors the logo to the top left corner */
      text-decoration: none;
      display: inline-block;
      z-index: 100;
    }

    .logo-link:hover .top-corner-logo {
      transform: scale(1.1); /* Zooms slightly when hovered */
      box-shadow: 0 0 22px rgba(0, 191, 255, 0.9);
    }
  </style>
</head>
<body>

<div id="visitorBox">
  <span id="visitorCount">Visitors: 0</span>
</div>

<a href="about.html" class="logo-link">
  <img src="logo.png" alt="NTM Online Logo" class="top-corner-logo">
</a>

<div class="hero glass-card">

  <h1>NTM Online</h1>

  <p class="subtitle">Your binge starts here 🎥</p>

  <button onclick="goToApp()" class="premium-btn">
    Get Started →
  </button>

</div>

<div class="footer">
  © 2026 Developed by Latheesh Reddy | For educational purposes only
</div>

<script>
function goToApp() {
  window.location.href = "search.html"; 
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
window.addEventListener("DOMContentLoaded", function () {

  try {
    const today = new Date().toLocaleDateString();

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const ref = db.collection("stats").doc("visitors");

    const lastVisit = localStorage.getItem("lastVisitDate");

    if (lastVisit !== today) {
      ref.set({
        count: firebase.firestore.FieldValue.increment(1)
      }, { merge: true })
      .then(() => {
        localStorage.setItem("lastVisitDate", today);
        return ref.get();
      })
      .then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    } else {
      ref.get().then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById("visitorCount").innerText =
      "Visitors unavailable";
  }

});
</script>

</body>
</html>
