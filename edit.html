<!DOCTYPE html>
<html>
<head>
  <title>Edit Files</title>
  <style>
    .ep-input { display: none; width: 80px; }
    .is-series .ep-input { display: inline-block; }
  </style>
</head>
<body>

<h2>Edit File</h2>

<button onclick="goBack()">← Back</button>

<hr>

<h3>Select File</h3>
<div id="fileList">Loading...</div>

<hr>

<h3>Edit Selected File</h3>

<div style="margin-bottom: 15px; padding: 10px; background: #eee; border-radius: 5px; display: inline-block;">
  <strong>Format:</strong>
  <label><input type="radio" name="format" value="movie" checked onchange="toggleFormat()"> Movie</label>
  <label><input type="radio" name="format" value="series" onchange="toggleFormat()"> Series</label>
</div>
<br>

<input type="text" id="name" placeholder="File Name"><br><br>
<input type="text" id="type" placeholder="Type"><br><br>
<input type="text" id="category" placeholder="Category"><br><br>

<input type="text" id="image" placeholder="Image URL"><br><br>

<h3>Download Links</h3>

<div id="links-container"></div>

<br>
<button onclick="addLink()">➕ Add More</button>

<br><br>

<textarea id="description" placeholder="Description"></textarea><br><br>

<button onclick="updateFile()">Update File</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let currentDocId = null;

// 🔒 PROTECT PAGE
auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  } else {
    loadFiles();
  }
});

// 🔄 TOGGLE MOVIE/SERIES
function toggleFormat() {
  const isSeries = document.querySelector('input[name="format"]:checked').value === "series";
  const container = document.getElementById("links-container");
  if (isSeries) {
    container.classList.add("is-series");
  } else {
    container.classList.remove("is-series");
  }
}

// 🔹 LOAD FILES
async function loadFiles() {
  const container = document.getElementById("fileList");
  container.innerHTML = "Loading...";
  const snapshot = await db.collection("files").get();
  container.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <strong>${data.name}</strong><br>
        ${data.type} • ${data.category}
        <br><br>
        <button onclick="selectFile('${doc.id}')">Edit</button>
      </div>
    `;
  });
}

// ➕ ADD LINK ROW (Updated with Quality)
function addLink(url = "", episode = "", quality = "720p", size = "", unit = "MB") {
  const container = document.getElementById("links-container");
  const div = document.createElement("div");
  div.classList.add("link-row");

  div.innerHTML = `
    <input type="text" value="${url}" placeholder="Enter link" class="link-input">
    <input type="text" value="${episode}" placeholder="Ep 1" class="ep-input">
    <select class="quality-input" style="width:80px;">
      <option value="Auto" ${quality==="Auto"?"selected":""}>Auto</option>
      <option value="480p" ${quality==="480p"?"selected":""}>480p</option>
      <option value="720p" ${quality==="720p"?"selected":""}>720p</option>
      <option value="1080p" ${quality==="1080p"?"selected":""}>1080p</option>
      <option value="4K" ${quality==="4K"?"selected":""}>4K</option>
    </select>
    <input type="number" value="${size}" placeholder="Size" class="size-input" style="width:70px;">
    <select class="size-unit">
      <option value="KB" ${unit==="KB"?"selected":""}>KB</option>
      <option value="MB" ${unit==="MB"?"selected":""}>MB</option>
      <option value="GB" ${unit==="GB"?"selected":""}>GB</option>
    </select>
    <button onclick="removeRow(this)">❌</button>
  `;
  container.appendChild(div);
}

// ❌ REMOVE ROW
function removeRow(btn) {
  btn.parentElement.remove();
}

// 🔹 SELECT FILE
async function selectFile(docId) {
  const docRef = db.collection("files").doc(docId);
  const docSnap = await docRef.get();
  if (!docSnap.exists) { alert("File not found"); return; }

  const data = docSnap.data();
  currentDocId = docId;

  document.getElementById("name").value = data.name || "";
  document.getElementById("type").value = data.type || "";
  document.getElementById("category").value = data.category || "";
  document.getElementById("image").value = data.image || "";
  document.getElementById("description").value = data.description || "";

  const container = document.getElementById("links-container");
  container.innerHTML = "";

  let isSeriesFormat = false;

  if (Array.isArray(data.links)) {
    data.links.forEach(link => {
      if (typeof link === "string") {
        // Unscramble legacy string links
        let decodedUrl = link;
        try { decodedUrl = atob(link); } catch(e) {}
        addLink(decodedUrl, "", "Auto", "", "MB");
      } else {
        if (link.episode) isSeriesFormat = true;
        // 🚀 UNSCRAMBLE THE URL SO ADMIN CAN READ IT
        let decodedUrl = link.url;
        try { decodedUrl = atob(link.url); } catch(e) {}
        
        // Pass the quality parameter (or default to 720p if missing)
        addLink(decodedUrl, link.episode || "", link.quality || "720p", link.size, link.unit);
      }
    });
  }

  // Set the toggle properly
  if (isSeriesFormat) {
    document.querySelector('input[name="format"][value="series"]').checked = true;
  } else {
    document.querySelector('input[name="format"][value="movie"]').checked = true;
  }
  toggleFormat();

  if (!data.links || data.links.length === 0) { addLink(); }
}

// 🔹 UPDATE FILE
async function updateFile() {
  if (!currentDocId) { alert("Select a file first"); return; }

  const fileName = document.getElementById("name").value.trim();
  const fileType = document.getElementById("type").value.trim();
  const fileCategory = document.getElementById("category").value.trim();
  const fileImage = document.getElementById("image").value.trim();
  const isSeries = document.querySelector('input[name="format"]:checked').value === "series";

  const rows = document.querySelectorAll(".link-row");
  let links = [];

  rows.forEach(row => {
    const url = row.querySelector(".link-input").value.trim();
    const episode = row.querySelector(".ep-input").value.trim();
    const quality = row.querySelector(".quality-input").value; // 🚀 GET QUALITY
    const size = row.querySelector(".size-input").value.trim();
    const unit = row.querySelector(".size-unit").value;

    if (url) {
      // 🚀 RE-SCRAMBLE URL BEFORE SAVING
      const scrambledUrl = btoa(url);

      if (isSeries && episode) {
        links.push({ url: scrambledUrl, episode, quality, size, unit });
      } else {
        links.push({ url: scrambledUrl, quality, size, unit });
      }
    }
  });

  const fileDescription = document.getElementById("description").value.trim();

  try {
    await db.collection("files").doc(currentDocId).update({
      name: fileName,
      type: fileType,
      category: fileCategory,
      image: fileImage,
      links: links,
      description: fileDescription
    });
    alert("File updated successfully!");
    currentDocId = null;
    loadFiles();
    document.getElementById("links-container").innerHTML = "";
  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

// 🔙 BACK
function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
