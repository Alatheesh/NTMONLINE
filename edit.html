<!DOCTYPE html>
<html>
<head>
  <title>Edit Movie • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 💎 UNIVERSAL ADMIN CSS */
    body {
      font-family: Arial, sans-serif;
      background: #0a1128;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h2 { color: #00bfff; margin-bottom: 20px; text-align: center; }
    
    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    label.field-label { display: block; margin-bottom: 5px; font-size: 13px; color: #00bfff; font-weight: bold; }
    
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2); color: white; outline: none; font-family: Arial, sans-serif;
    }
    input:focus, select:focus, textarea:focus { border-color: #00bfff; background: rgba(255,255,255,0.05); }
    
    /* 🛠️ THE DROPDOWN FIX (Makes options visible on Android/Windows) */
    select option { background-color: #0a1128; color: white; padding: 10px; }
    
    button {
      width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px;
      background: #00bfff; color: black; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #008cba; transform: scale(1.02); }
    
    .back-btn { background: rgba(255, 255, 255, 0.1); color: white; width: auto; padding: 8px 16px; margin-bottom: 20px; }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
    .btn-danger { background: #ff4d4d; color: white; width: auto; padding: 8px 12px; margin: 0; }
    .btn-danger:hover { background: #cc0000; }

    /* 🔘 FORMAT TOGGLE & LINKS */
    .radio-group {
      display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;
      background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    }
    .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 15px; font-weight: bold; }

    .link-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .link-row input, .link-row select, .link-row button { margin-bottom: 0; padding: 10px; }
    .link-input { flex: 1; min-width: 150px; }
    
    .ep-wrapper { display: none; align-items: center; gap: 5px; background: rgba(0,0,0,0.2); padding: 0 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
    .ep-wrapper input { border: none; background: transparent; width: 45px; padding: 10px 0; color: white; outline: none; }
    .quality-input { display: none; width: auto; }
    
    .is-series .ep-wrapper { display: flex; }
    .is-series .quality-input { display: block; }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='admin.html'">← Back to Dashboard</button>

<div class="container">
  <h2>✏️ Edit Movie / Series</h2>

  <label class="field-label">Select File to Edit</label>
  <select id="movieSelect" onchange="loadMovieDetails()">
    <option value="">-- Loading Database... --</option>
  </select>

  <div id="editForm" style="display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
    
    <div class="radio-group">
      <label><input type="radio" name="format" value="movie" onchange="toggleFormat()"> 🎬 Movie</label>
      <label><input type="radio" name="format" value="series" onchange="toggleFormat()"> 📺 Series</label>
    </div>

    <label class="field-label">File Name</label>
    <input type="text" id="name">

    <label class="field-label">Type</label>
    <input type="text" id="type">

    <label class="field-label">Category</label>
    <input type="text" id="category">

    <label class="field-label">Cover Image URL</label>
    <input type="text" id="image">

    <label class="field-label">Download / Stream Links</label>
    <div id="links-container"></div>
    <button style="background: rgba(255,255,255,0.1); color: white; border: 1px dashed rgba(255,255,255,0.3); margin-top: 10px;" onclick="addLink()">➕ Add Another Link</button>

    <label class="field-label" style="margin-top: 15px;">Description</label>
    <textarea id="description" rows="3"></textarea>

    <button onclick="saveChanges()" style="margin-top: 10px; font-size: 16px;">💾 Save Changes</button>
  </div>
  
  <p id="status" style="text-align: center; font-size: 14px; margin-top: 10px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  // Keep you logged in on this device
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // 🕒 Check 24-Hour Admin Session
  if (!localStorage.getItem("ntm_admin_session")) {
    window.location.href = "admin.html";
  }

  let allMovies = [];
  let currentMovieIndex = -1;

  // 🔐 Wait for Firebase to confirm you are the true admin before loading the database
  auth.onAuthStateChanged(user => {
    if (user) {
      fetchMovies();
    } else {
      window.location.href = "admin.html";
    }
  });

  async function fetchMovies() {
    try {
      const docSnap = await db.collection("movie_database").doc("master_list").get();
      if (docSnap.exists && docSnap.data().movies) {
        allMovies = docSnap.data().movies;
        populateDropdown();
      }
    } catch (e) {
      document.getElementById("status").innerText = "❌ Error loading movies.";
      document.getElementById("status").style.color = "#ff4d4d";
    }
  }

  function populateDropdown() {
    const select = document.getElementById("movieSelect");
    select.innerHTML = '<option value="">-- Select a file to edit --</option>'; 
    allMovies.forEach((movie, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.text = movie.name + " (" + movie.type + ")";
      select.appendChild(option);
    });
  }

  function toggleFormat() {
    const isSeries = document.querySelector('input[name="format"]:checked').value === "series";
    const container = document.getElementById("links-container");
    if (isSeries) {
      container.classList.add("is-series");
    } else {
      container.classList.remove("is-series");
    }
  }

  function addLink(url = "", ep = "1", quality = "720p", size = "", unit = "MB") {
    const container = document.getElementById("links-container");
    const div = document.createElement("div");
    div.classList.add("link-row");

    div.innerHTML = `
      <input type="text" placeholder="Paste video link..." class="link-input" value="${url}">
      <div class="ep-wrapper">
        <span style="color:#00bfff; font-weight:bold; font-size: 14px;">Ep</span>
        <input type="number" class="ep-input" min="1" value="${ep}">
      </div>
      <select class="quality-input">
        <option value="Auto" ${quality === "Auto" ? "selected" : ""}>Auto</option>
        <option value="480p" ${quality === "480p" ? "selected" : ""}>480p</option>
        <option value="720p" ${quality === "720p" ? "selected" : ""}>720p</option>
        <option value="1080p" ${quality === "1080p" ? "selected" : ""}>1080p</option>
        <option value="4K" ${quality === "4K" ? "selected" : ""}>4K</option>
      </select>
      <input type="number" placeholder="Size" class="size-input" style="width:75px;" min="0" step="0.1" value="${size}">
      <select class="size-unit" style="width:65px;">
        <option value="MB" ${unit === "MB" ? "selected" : ""}>MB</option>
        <option value="GB" ${unit === "GB" ? "selected" : ""}>GB</option>
      </select>
      <button class="btn-danger" onclick="removeRow(this)">❌</button>
    `;
    container.appendChild(div);
  }

  function removeRow(btn) {
    btn.parentElement.remove();
  }

  function loadMovieDetails() {
    const select = document.getElementById("movieSelect");
    const index = select.value;
    const form = document.getElementById("editForm");

    if (index === "") {
      form.style.display = "none";
      return;
    }

    currentMovieIndex = parseInt(index);
    const movie = allMovies[currentMovieIndex];

    document.getElementById("name").value = movie.name || "";
    document.getElementById("type").value = movie.type || "Movie";
    document.getElementById("category").value = movie.category || "";
    document.getElementById("image").value = movie.image || "";
    document.getElementById("description").value = movie.description || "";
    
    const container = document.getElementById("links-container");
    container.innerHTML = "";
    let isSeriesFormat = false;

    if (Array.isArray(movie.links) && movie.links.length > 0) {
      movie.links.forEach(link => {
        let url = "";
        let ep = "1";
        let quality = "720p";
        let size = "";
        let unit = "MB";

        // Handle string format or object format
        if (typeof link === "string") {
          try { url = atob(link); } catch(e) { url = link; }
        } else {
          try { url = atob(link.url); } catch(e) { url = link.url; }
          if (link.episode) {
            isSeriesFormat = true;
            ep = link.episode.replace("Ep ", "").trim();
          }
          quality = link.quality || "720p";
          size = link.size || "";
          unit = link.unit || "MB";
        }
        addLink(url, ep, quality, size, unit);
      });
    } else {
      addLink(); 
    }

    if (isSeriesFormat) {
      document.querySelector('input[name="format"][value="series"]').checked = true;
    } else {
      document.querySelector('input[name="format"][value="movie"]').checked = true;
    }
    toggleFormat();

    form.style.display = "block";
  }

  async function saveChanges() {
    const status = document.getElementById("status");
    if (currentMovieIndex === -1) return;

    const isSeries = document.querySelector('input[name="format"]:checked').value === "series";
    const rows = document.querySelectorAll(".link-row");
    let newLinks = [];

    rows.forEach(row => {
      const url = row.querySelector(".link-input").value.trim();
      const episodeNum = row.querySelector(".ep-input").value;
      const quality = row.querySelector(".quality-input").value; 
      const size = row.querySelector(".size-input").value.trim();
      const unit = row.querySelector(".size-unit").value;

      if (url) {
        const scrambledUrl = btoa(url);
        if (isSeries && episodeNum) {
          newLinks.push({ url: scrambledUrl, episode: "Ep " + episodeNum, quality, size, unit }); 
        } else {
          newLinks.push({ url: scrambledUrl, size, unit }); 
        }
      }
    });

    if (newLinks.length === 0) {
      alert("❌ You must have at least one link!");
      return;
    }

    // Disable button to prevent double-clicks
    const btn = document.querySelector("button[onclick='saveChanges()']");
    btn.innerText = "Saving...";
    btn.disabled = true;

    allMovies[currentMovieIndex].name = document.getElementById("name").value.trim();
    allMovies[currentMovieIndex].type = document.getElementById("type").value.trim();
    allMovies[currentMovieIndex].category = document.getElementById("category").value.trim();
    allMovies[currentMovieIndex].image = document.getElementById("image").value.trim();
    allMovies[currentMovieIndex].description = document.getElementById("description").value.trim();
    allMovies[currentMovieIndex].links = newLinks;

    try {
      await db.collection("movie_database").doc("master_list").update({
        movies: allMovies
      });
      status.style.color = "#00bfff";
      status.innerText = "✅ Movie updated successfully!";
      
      const select = document.getElementById("movieSelect");
      select.options[select.selectedIndex].text = allMovies[currentMovieIndex].name + " (" + allMovies[currentMovieIndex].type + ")";
      
    } catch (error) {
      status.style.color = "#ff4d4d";
      status.innerText = "❌ Error saving: " + error.message;
    }

    btn.innerText = "💾 Save Changes";
    btn.disabled = false;
  }
</script>

</body>
</html>
