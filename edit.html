<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Movie • NTM Admin</title>
  <style>
    /* 💎 PROFESSIONAL ADMIN CSS */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #050a19 0%, #0a1128 100%); 
      color: white; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      min-height: 100vh;
    }

    .container { 
      background: rgba(255, 255, 255, 0.03); 
      padding: 30px; 
      border-radius: 15px; 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      width: 100%; 
      max-width: 800px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
      box-sizing: border-box;
    }

    h2 { color: #00bfff; margin-top: 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

    .back-btn { 
      background: rgba(255, 255, 255, 0.1); 
      color: white; 
      padding: 10px 20px; 
      margin-bottom: 20px; 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: bold;
      transition: 0.3s;
      align-self: flex-start;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

    /* FORM STYLES */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
    
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; 
      padding: 12px; 
      border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.15); 
      background: rgba(0,0,0,0.3); 
      color: white; 
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #00bfff; }
    
    textarea { resize: vertical; height: 100px; }

    /* DYNAMIC LINKS SECTION */
    .links-section {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
    }

    .links-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .links-header h3 { margin: 0; color: #00ffcc; font-size: 16px; }

    .link-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 3fr auto;
      gap: 10px;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 600px) {
      .link-row { grid-template-columns: 1fr 1fr; }
      .link-url-wrapper { grid-column: span 2; }
    }

    /* BUTTONS */
    .btn-add { background: rgba(0, 255, 204, 0.2); color: #00ffcc; border: 1px solid #00ffcc; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
    .btn-add:hover { background: #00ffcc; color: black; }

    .btn-remove { background: #ff4d4d; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; height: 100%; transition: 0.3s;}
    .btn-remove:hover { background: #cc0000; }

    .btn-save { 
      background: #00bfff; 
      color: black; 
      width: 100%; 
      padding: 15px; 
      font-size: 16px; 
      font-weight: bold; 
      border: none; 
      border-radius: 8px; 
      margin-top: 20px; 
      cursor: pointer; 
      transition: 0.3s; 
    }
    .btn-save:hover { background: #008cba; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,191,255,0.3); }

    /* LOADING OVERLAY */
    #loader { display: none; text-align: center; color: #00bfff; padding: 20px; font-weight: bold; }
  </style>
</head>
<body>

  <button class="back-btn" onclick="window.location.href='admin.html'">← Back to Admin Panel</button>

  <div class="container">
    <h2>✏️ Edit Entry</h2>
    
    <div id="loader">⏳ Loading Data from Firebase...</div>

    <div id="editorForm" style="display: none;">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="m_name" placeholder="Movie / Series Name">
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Type</label>
          <select id="m_type">
            <option value="Movie">Movie</option>
            <option value="Series">Series</option>
            <option value="TELUGU">TELUGU</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="m_category" placeholder="Action, Drama, HD...">
        </div>
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="m_image" placeholder="https://image.tmdb.org/...">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="m_desc" placeholder="Plot summary..."></textarea>
      </div>

      <!-- LINKS SECTION -->
      <div class="links-section">
        <div class="links-header">
          <h3>🔗 Downloads / Links</h3>
          <button class="btn-add" onclick="addLinkRow()">+ Add Link</button>
        </div>
        <div id="linksWrapper">
          <!-- Link rows will be injected here -->
        </div>
      </div>

      <button class="btn-save" id="saveBtn" onclick="saveData()">💾 Update Database</button>
    </div>
  </div>

  <!-- Firebase Dependencies -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    // Security check
    auth.onAuthStateChanged(user => {
      if (!user) window.location.href = "admin.html";
      else initEditor();
    });

    let masterArray = [];
    let movieIndex = -1;
    let targetId = new URLSearchParams(window.location.search).get("id");

    async function initEditor() {
      if (!targetId) {
        alert("No ID provided to edit!");
        window.location.href = "admin.html";
        return;
      }

      document.getElementById("loader").style.display = "block";

      try {
        const snap = await db.collection("movie_database").doc("master_list").get();
        if (snap.exists && snap.data().movies) {
          masterArray = snap.data().movies;
          
          // Find the specific movie
          movieIndex = masterArray.findIndex(m => String(m.id || m.customId) === String(targetId));
          
          if (movieIndex > -1) {
            populateForm(masterArray[movieIndex]);
            document.getElementById("loader").style.display = "none";
            document.getElementById("editorForm").style.display = "block";
          } else {
            alert("Entry not found in Firebase!");
            window.location.href = "admin.html";
          }
        }
      } catch (err) {
        alert("Error fetching database: " + err.message);
      }
    }

    function populateForm(data) {
      document.getElementById("m_name").value = data.name || "";
      document.getElementById("m_type").value = data.type || "Movie";
      document.getElementById("m_category").value = data.category || "";
      document.getElementById("m_image").value = data.image || "";
      document.getElementById("m_desc").value = data.description || "";

      // 🔍 CRITICAL FIX: Look for 'downloads' OR 'links'
      const linksArray = data.downloads || data.links || [];
      const wrapper = document.getElementById("linksWrapper");
      wrapper.innerHTML = ""; // Clear existing

      if (linksArray.length === 0) {
        addLinkRow(); // Add an empty row if no links exist
      } else {
        linksArray.forEach(linkObj => addLinkRow(linkObj));
      }
    }

    function addLinkRow(data = {}) {
      const wrapper = document.getElementById("linksWrapper");
      const row = document.createElement("div");
      row.className = "link-row";
      
      row.innerHTML = `
        <input type="text" class="l-ep" placeholder="Ep 1" value="${data.episode || ''}">
        <input type="text" class="l-quality" placeholder="720p" value="${data.quality || ''}">
        <input type="number" class="l-size" placeholder="Size" value="${data.size || ''}">
        <select class="l-unit">
          <option value="MB" ${data.unit === 'MB' ? 'selected' : ''}>MB</option>
          <option value="GB" ${data.unit === 'GB' ? 'selected' : ''}>GB</option>
        </select>
        <div class="link-url-wrapper">
          <input type="text" class="l-url" placeholder="Paste Base64 URL here" value="${data.url || ''}">
        </div>
        <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
      `;
      wrapper.appendChild(row);
    }

    async function saveData() {
      const btn = document.getElementById("saveBtn");
      btn.innerText = "⏳ Saving...";
      btn.disabled = true;

      // Gather Links
      const rows = document.querySelectorAll(".link-row");
      const updatedLinks = [];
      
      rows.forEach(row => {
        const url = row.querySelector(".l-url").value.trim();
        if (url !== "") { // Only save rows that have a URL
          updatedLinks.push({
            episode: row.querySelector(".l-ep").value.trim(),
            quality: row.querySelector(".l-quality").value.trim(),
            size: row.querySelector(".l-size").value.trim(),
            unit: row.querySelector(".l-unit").value,
            url: url
          });
        }
      });

      // Construct Updated Object
      const updatedMovie = {
        id: Number(targetId),
        customId: Number(targetId), // Keep legacy support
        name: document.getElementById("m_name").value.trim(),
        type: document.getElementById("m_type").value,
        category: document.getElementById("m_category").value.trim(),
        image: document.getElementById("m_image").value.trim(),
        description: document.getElementById("m_desc").value.trim(),
        downloads: updatedLinks // Use the new JSON key 'downloads'
      };

      // Replace the old object in the array with the new one
      masterArray[movieIndex] = updatedMovie;

      // Push entire array back to Firebase
      try {
        await db.collection("movie_database").doc("master_list").set({
          movies: masterArray
        });
        alert("✅ Database Updated Successfully!");
        window.location.href = "admin.html"; // Go back to dashboard
      } catch (err) {
        alert("❌ Error saving: " + err.message);
        btn.innerText = "💾 Update Database";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
